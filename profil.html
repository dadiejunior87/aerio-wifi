<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Matrice d'Identité Alpha (DADIE IA)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C2FF;
            --accent: #00F5A0;
            --purple: #BC00FF;
            --bg-deep: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(0, 194, 255, 0.2);
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg-deep); color: white; 
            background-image: radial-gradient(circle at 0% 0%, #0f172a 0%, #020617 100%);
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- SIDEBAR ALPHA --- */
        .sidebar {
            width: 280px; background: rgba(11, 15, 26, 0.8); 
            backdrop-filter: blur(15px); padding: 30px 15px; height: 100vh;
            position: fixed; border-right: 1px solid var(--border); display: flex; flex-direction: column;
            z-index: 100;
        }

        .nav-button {
            background: rgba(255,255,255,0.02); padding: 12px 15px; border-radius: 12px;
            display: flex; align-items: center; text-decoration: none; font-size: 12px; margin-bottom: 8px; 
            border: 1px solid rgba(255,255,255,0.05); color: #94a3b8; transition: 0.3s;
        }
        .nav-button.active { border-left: 4px solid var(--primary); background: rgba(0, 194, 255, 0.1); color: var(--primary); font-weight: 600; }

        /* --- CONTENU --- */
        .content { margin-left: 280px; padding: 40px; }

        .profile-matrix {
            max-width: 1000px; margin: 0 auto; display: grid;
            grid-template-columns: 350px 1fr; gap: 30px;
        }

        /* --- CARTE HOLOGRAPHIQUE --- */
        .id-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border); border-radius: 30px; padding: 40px;
            text-align: center; backdrop-filter: blur(20px); position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden;
        }

        .id-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 194, 255, 0.05), transparent);
            transform: rotate(45deg); animation: shine 6s infinite linear;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .avatar-vault {
            width: 120px; height: 120px; border-radius: 25px; border: 2px solid var(--primary);
            margin: 0 auto 20px; display: flex; align-items: center;
            justify-content: center; background: #000; box-shadow: 0 0 30px rgba(0, 194, 255, 0.2);
            font-size: 50px;
        }

        .user-rank {
            background: var(--primary); color: #000; font-weight: 900;
            padding: 4px 12px; border-radius: 8px; font-size: 9px;
            letter-spacing: 1px; position: absolute; bottom: 155px; left: 50%; transform: translateX(-50%);
        }

        /* --- FORMULAIRE DE CONFIGURATION --- */
        .config-vault {
            background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255,255,255,0.05);
            padding: 30px;
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .info-card {
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .info-card:focus-within { border-color: var(--primary); background: rgba(0, 194, 255, 0.05); }

        .info-card label {
            display: block; font-size: 9px; font-weight: 900; color: var(--primary);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
        }

        .info-card input, .info-card select {
            background: transparent; border: none; color: white; font-size: 15px;
            font-weight: 600; width: 100%; outline: none;
        }

        .btn-save {
            grid-column: span 2; margin-top: 10px;
            background: var(--primary); color: #020617; border: none;
            padding: 18px; border-radius: 15px; font-weight: 900;
            cursor: pointer; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 194, 255, 0.4); }

        /* DNA Signature Animation */
        .dna-box {
            height: 60px; width: 100%; border: 1px dashed var(--purple);
            border-radius: 15px; margin-top: 20px; display: flex; align-items: center; justify-content: center;
        }
        .dna-line { width: 80%; height: 2px; background: var(--purple); box-shadow: 0 0 15px var(--purple); animation: pulseDNA 2s infinite; }
        @keyframes pulseDNA { 0%, 100% { opacity: 0.2; transform: scaleX(0.9); } 50% { opacity: 1; transform: scaleX(1.1); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="color:var(--primary); font-weight:900; font-size:24px; margin-bottom:40px; padding-left:10px;">🛰️ AERIO</div>
        <a href="dashboard.html" class="nav-button">🏠 Tableau de Bord</a>
        <a href="rapports.html" class="nav-button">📊 Statistiques</a>
        <a href="profil.html" class="nav-button active">👤 Mon Profil</a>
        <a href="support.html" class="nav-button">🎧 Support Client</a>
    </div>

    <div class="content">
        <div class="profile-matrix">
            <div class="id-card">
                <div class="avatar-vault">👤</div>
                <div class="user-rank">GOLD PILOT</div>
                <h2 id="display-name" style="margin-top: 20px; font-weight: 900; letter-spacing: -1px;">Utilisateur Alpha</h2>
                <p id="display-id" style="color: var(--text-dim); font-size: 11px; margin-bottom: 20px;">ID: #AE-2026-001</p>
                
                <div style="text-align: left; margin-top: 30px;">
                    <label style="font-size: 8px; color: var(--purple); font-weight: 900; letter-spacing: 2px;">SIGNATURE BIO-NUMÉRIQUE</label>
                    <div class="dna-box"><div class="dna-line"></div></div>
                </div>

                <div style="margin-top: 30px; padding: 15px; background: rgba(0, 245, 160, 0.05); border-radius: 15px; border: 1px solid rgba(0, 245, 160, 0.2);">
                    <p style="color: #00F5A0; font-size: 10px; font-weight: 900;">STATUT: COMPTE VÉRIFIÉ</p>
                </div>
            </div>

            <div class="config-vault">
                <h2 style="font-size: 20px; font-weight: 900; margin-bottom: 25px;">CONFIGURATION <span style="color: var(--primary);">SYSTÈME</span></h2>
                
                <form id="profileForm" class="info-grid">
                    <div class="info-card">
                        <label>Nom complet du Réseau</label>
                        <input type="text" id="netName" placeholder="Ex: Cyber-Espace Alpha">
                    </div>
                    <div class="info-card">
                        <label>Devise de Vente</label>
                        <select id="currency">
                            <option value="XAF">Franc CFA (XAF)</option>
                            <option value="EUR">Euro (€)</option>
                            <option value="USD">Dollar ($)</option>
                        </select>
                    </div>
                    <div class="info-card">
                        <label>Numéro WhatsApp</label>
                        <input type="text" id="netPhone" placeholder="+237 6xx xxx xxx">
                    </div>
                    <div class="info-card">
                        <label>Localisation</label>
                        <input type="text" id="netLoc" placeholder="Maroua, Cameroun">
                    </div>
                    <div class="info-card" style="grid-column: span 2;">
                        <label>Clé d'accès Administration (Mot de passe)</label>
                        <input type="password" id="pass" value="********">
                    </div>
                    
                    <button type="submit" class="btn-save">METTRE À JOUR LA MATRICE 🛰️</button>
                </form>

                <p style="margin-top: 30px; font-size: 10px; color: var(--text-dim); text-align: center;">
                    DADIE IA : Les modifications de profil impactent vos tickets de vente.
                </p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('profileForm');

        // CHARGER LES DONNÉES (On garde ta logique localeStorage)
        window.onload = () => {
            const config = JSON.parse(localStorage.getItem('aerio_config')) || {};
            if(config.name) {
                document.getElementById('netName').value = config.name;
                document.getElementById('display-name').innerText = config.name;
            }
            if(config.currency) document.getElementById('currency').value = config.currency;
            if(config.phone) document.getElementById('netPhone').value = config.phone;
            if(config.loc) document.getElementById('netLoc').value = config.loc;
        };

        // ENREGISTRER
        form.onsubmit = (e) => {
            e.preventDefault();
            const config = {
                name: document.getElementById('netName').value,
                currency: document.getElementById('currency').value,
                phone: document.getElementById('netPhone').value,
                loc: document.getElementById('netLoc').value
            };
            localStorage.setItem('aerio_config', JSON.stringify(config));
            
            // Mise à jour visuelle instantanée
            document.getElementById('display-name').innerText = config.name;
            
            // Petit effet de succès premium
            const btn = document.querySelector('.btn-save');
            btn.innerText = "MATRICE MISE À JOUR ✓";
            btn.style.background = "var(--accent)";
            setTimeout(() => {
                btn.innerText = "METTRE À JOUR LA MATRICE 🛰️";
                btn.style.background = "var(--primary)";
            }, 2000);
        };
    </script>
</body>
</html>
