<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO ZONE | Elite WiFi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C2FF; --secondary: #7000FF; --accent: #00F5A0;
            --bg: #030712; --card-bg: rgba(10, 20, 45, 0.95);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background:var(--bg); color:white; overflow-x:hidden; display:flex; flex-direction:column; min-height:100vh; }

        .orb {
            position: fixed; width: 500px; height: 500px; border-radius:50%;
            background: radial-gradient(circle, rgba(0,194,255,0.1) 0%, transparent 70%);
            z-index:-1; filter:blur(60px); animation: moveOrb 15s infinite alternate;
        }
        @keyframes moveOrb { from { transform:translate(-10%,-10%);} to { transform:translate(30%,20%);} }

        header { padding:40px 20px 15px; text-align:center; }
        h1 { font-size:2.2rem; font-weight:900; letter-spacing:-1px;
            background: linear-gradient(to right, #fff, var(--primary), var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; 
        }

        .container { max-width:400px; margin:0 auto; padding:0 20px; width:100%; z-index:10; }
        .box { background:var(--card-bg); padding:30px; border-radius:25px; backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.05); text-align:center; margin-bottom:20px;
            box-shadow:0 20px 50px rgba(0,0,0,0.5); 
        }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-label { font-size: 10px; font-weight: 800; color: var(--primary); margin-left: 5px; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 1px; }

        .input-field { width:100%; padding:15px; 
            background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
            border-radius:15px; color:white; outline:none; text-align:center; font-size:16px; transition: 0.3s;
            text-transform: uppercase;
        }
        .input-field:focus { border-color: var(--primary); background: rgba(0, 194, 255, 0.05); }

        .btn-main { width:100%; padding:18px; border:none; border-radius:15px;
            background:linear-gradient(45deg,var(--primary),var(--secondary));
            color:white; font-weight:800; cursor:pointer; transition:0.4s; text-transform:uppercase; letter-spacing:1px; margin-top: 10px;
        }

        /* --- SECTION PAIEMENT --- */
        .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .pay-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s;
            text-decoration: none; color: inherit;
        }
        .pay-card:hover { border-color: var(--accent); background: rgba(0, 245, 160, 0.05); }
        .pay-price { font-size: 18px; font-weight: 900; color: var(--accent); }
        .pay-desc { font-size: 9px; color: #64748b; text-transform: uppercase; }
        .btn-pay-submit { 
            background: var(--accent); color: #030712; width: 100%; padding: 12px; 
            border: none; border-radius: 10px; font-weight: 800; font-size: 11px; margin-top: 10px; cursor: pointer;
        }

        #bot-trigger { position:fixed; bottom:25px; right:25px; width:60px; height:60px;
            background:linear-gradient(135deg,var(--primary),var(--secondary)); border-radius:20px;
            display:flex; align-items:center; justify-content:center; font-size:25px; cursor:pointer; z-index:1000;
            animation:pulseBot 2s infinite; border:2px solid rgba(255,255,255,0.2);
        }
        @keyframes pulseBot { 0% { transform:translateY(0);} 50% { transform:translateY(-8px);} 100%{ transform:translateY(0);} }

        #bot-window { position:fixed; bottom:100px; right:25px; width:280px; background:#0D1117;
            border:1px solid var(--primary); border-radius:20px; padding:20px; display:none; z-index:1001;
        }

        footer { margin-top:auto; padding:20px; text-align:center; font-size:9px; color:#444; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="orb"></div>

<header>
    <h1>AERIO ZONE</h1>
    <p style="color: var(--primary); font-size:9px; font-weight:700; letter-spacing:3px;">RÉSEAU ÉLITE • DADIE IA SECURED</p>
</header>

<div class="container">
    <div class="box">
        <div id="loginForm">
            <div class="input-group">
                <span class="input-label">Code d'accès</span>
                <input type="text" id="accessCode" class="input-field" placeholder="EX: AX-789" required>
            </div>
            <button type="button" onclick="validerConnexion()" class="btn-main">ACTIVER L'ACCÈS 🚀</button>
        </div>
    </div>

    <div class="box">
        <span class="input-label" style="text-align: center; margin-left: 0;">Pas de ticket ? Achetez ici</span>
        <div class="pay-grid">
            
            <div class="pay-card" onclick="alert('Redirection vers passerelle de paiement...')">
                <div class="pay-price">100F</div>
                <div class="pay-desc">1 HEURE</div>
                <button class="btn-pay-submit">MOMO/OM</button>
            </div>
            
            <div class="pay-card" onclick="alert('Redirection vers passerelle de paiement...')">
                <div class="pay-price">500F</div>
                <div class="pay-desc">24 HEURES</div>
                <button class="btn-pay-submit">MOMO/OM</button>
            </div>

        </div>
    </div>
</div>

<div id="bot-trigger" onclick="toggleBot()">🤖</div>
<div id="bot-window">
    <p style="font-size:12px; color:#ccc; line-height:1.4;">
        <b>Besoin d'aide ?</b><br><br>
        1. Achetez un code via MOMO/OM.<br>
        2. Entrez le code reçu dans le champ "Code d'accès".<br>
        3. Cliquez sur Activer.<br><br>
        <a href="https://wa.me/237692487922" style="color:var(--accent); text-decoration:none;">→ Support WhatsApp</a>
    </p>
</div>

<footer>POWERED BY DADIE IA & STARLINK TECH</footer>

<script>
// LOGIQUE DE CONNEXION DADIE IA
function validerConnexion() {
    const codeSaisi = document.getElementById('accessCode').value.trim().toUpperCase();
    if(!codeSaisi) return alert("Veuillez entrer un code.");

    let stock = JSON.parse(localStorage.getItem('aerio_stock')) || [];
    
    // On cherche le code dans le stock (non vendu)
    const ticketIndex = stock.findIndex(t => t.code.toUpperCase() === codeSaisi && !t.vendu);

    if (ticketIndex !== -1) {
        // TICKET VALIDE
        stock[ticketIndex].vendu = true;
        stock[ticketIndex].dateVente = new Date().toLocaleString();
        
        // Sauvegarde
        localStorage.setItem('aerio_stock', JSON.stringify(stock));

        // Succès
        const btn = document.querySelector('.btn-main');
        btn.innerHTML = "SESSION ACTIVÉE ✅";
        btn.style.background = "var(--accent)";
        btn.style.color = "#000";

        setTimeout(() => {
            alert("Accès autorisé ! Bienvenue sur le réseau.");
            window.location.href = "https://www.google.com";
        }, 1500);
    } else {
        alert("❌ Code invalide ou déjà expiré.");
    }
}

function toggleBot() {
    var win = document.getElementById('bot-window');
    win.style.display = (win.style.display === 'block') ? 'none' : 'block';
}

// RECUPERATION PARTENAIRE
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const pid = urlParams.get('pid');
    if (pid) {
        console.log("AERIO: Partenaire identifié : " + pid);
    }
};
</script>
</body>
</html>
