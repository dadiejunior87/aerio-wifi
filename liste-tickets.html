<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Vente Rapide</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C2FF; --accent: #00F5A0; --warning: #FFAB00; --danger: #ff4757;
            --bg-deep: #020617; --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08); --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: var(--bg-deep); color: white; display: flex; min-height: 100vh;
            background-image: radial-gradient(circle at bottom left, rgba(0, 194, 255, 0.05), transparent 40%);
        }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-w); background: #0b0f1a; padding: 30px 20px; height: 100vh; position: fixed; border-right: 1px solid var(--border); z-index: 100; }
        .logo-title { color: var(--primary); font-weight: 900; font-size: 24px; margin-bottom: 40px; letter-spacing: -1px; }
        .nav-link { padding: 14px 18px; color: #64748b; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 13px; border-radius: 12px; transition: 0.3s; margin-bottom: 8px; }
        .nav-link.active { background: linear-gradient(90deg, rgba(0, 194, 255, 0.15), transparent); color: var(--primary); font-weight: 600; border-left: 3px solid var(--primary); }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 40px; max-width: 1200px; }
        
        /* --- STATS DYNAMIQUES --- */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-item { background: var(--card-bg); padding: 25px; border-radius: 22px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .stat-value { font-size: 30px; font-weight: 900; display: block; margin-top: 5px; }

        /* --- GRID DES CARTES --- */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .ticket-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 24px; padding: 25px; border: 1px solid var(--border);
            position: relative; transition: 0.4s; overflow: hidden;
        }
        .ticket-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .offer-badge { background: rgba(0, 194, 255, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 700; border: 1px solid rgba(0, 194, 255, 0.2); }
        .price-tag { font-weight: 900; font-size: 18px; color: var(--accent); }

        .card-body { text-align: center; padding: 20px 0; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); margin-bottom: 20px; }
        .code-display { font-family: 'monospace'; font-size: 28px; font-weight: 900; letter-spacing: 3px; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        
        .btn-sell {
            width: 100%; background: linear-gradient(135deg, var(--primary), #0077FF);
            color: white; border: none; padding: 14px; border-radius: 15px;
            font-weight: 900; font-size: 12px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }
        .btn-sell:hover { filter: brightness(1.2); box-shadow: 0 10px 20px rgba(0, 194, 255, 0.3); }

        /* --- MODE IMPRESSION --- */
        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { position: absolute; left: 0; top: 0; width: 100%; text-align: center; color: black; background: white; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-title" id="sideLogo">AERIO</div>
        <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
        <a href="ajouter-tarif.html" class="nav-link">💎 Ajouter un Tarif</a>
        <a href="liste-tarif.html" class="nav-link">📜 Ma Grille Tarifaire</a>
        <a href="ajouter-ticket.html" class="nav-link">🎫 Générer un Pass</a>
        <a href="liste-tickets.html" class="nav-link active">🔑 Registre & Vente</a>
    </div>

    <div class="main-content">
        <div class="header-flex" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1 style="font-size: 28px; font-weight: 900;">SALLE DES <span style="color:var(--primary)">VENTES</span></h1>
            <div id="clock" style="font-family:monospace; color:var(--primary); font-weight:bold;"></div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Tickets en Stock</span>
                <span id="stockCount" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Cagnotte Jour</span>
                <span id="cagnotteJour" class="stat-value" style="color:var(--accent)">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Vendus</span>
                <span id="totalVendus" class="stat-value" style="color:var(--warning)">0</span>
            </div>
        </div>

        <div id="cardsView" class="grid-cards">
            </div>

        <div id="emptyState" style="text-align:center; padding:100px; display:none; opacity:0.5;">
            <span style="font-size:50px;">📦</span>
            <h2 style="margin-top:20px;">Le stock est vide !</h2>
            <p>Veuillez générer ou importer de nouveaux codes.</p>
        </div>
    </div>

    <div id="printSection" style="display:none;"></div>

    <script>
        // Mise à jour de l'heure
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);

        function chargerVentes() {
            const config = JSON.parse(localStorage.getItem('aerio_config')) || {};
            const devise = config.currency || 'XAF';
            document.getElementById('sideLogo').innerText = config.name || "AERIO";

            const stock = JSON.parse(localStorage.getItem('aerio_stock')) || [];
            const tarifs = JSON.parse(localStorage.getItem('aerio_tarifs')) || [];
            const cardsContainer = document.getElementById('cardsView');
            
            // Calcul des stats
            const dispo = stock.filter(s => !s.vendu);
            const vendus = stock.filter(s => s.vendu);
            
            let totalCA = 0;
            vendus.forEach(v => {
                const t = tarifs.find(tar => tar.id == v.tarifId);
                if(t) totalCA += parseFloat(t.prix);
            });

            document.getElementById('stockCount').innerText = dispo.length;
            document.getElementById('totalVendus').innerText = vendus.length;
            document.getElementById('cagnotteJour').innerText = `${totalCA} ${devise}`;

            // Affichage des cartes
            cardsContainer.innerHTML = "";
            if(dispo.length === 0) {
                document.getElementById('emptyState').style.display = "block";
                return;
            } else {
                document.getElementById('emptyState').style.display = "none";
            }

            dispo.reverse().forEach(item => {
                const tarif = tarifs.find(t => t.id == item.tarifId) || { nom: "Standard", prix: 0 };
                
                cardsContainer.innerHTML += `
                    <div class="ticket-card">
                        <div class="card-header">
                            <span class="offer-badge">${tarif.nom}</span>
                            <span class="price-tag">${tarif.prix} ${devise}</span>
                        </div>
                        <div class="card-body">
                            <span class="stat-label">CODE D'ACCÈS</span><br>
                            <span class="code-display">${item.code}</span>
                        </div>
                        <button class="btn-sell" onclick="vendre('${item.code}')">Vendre & Imprimer ⚡</button>
                    </div>
                `;
            });
        }

        function vendre(code) {
            let stock = JSON.parse(localStorage.getItem('aerio_stock')) || [];
            const index = stock.findIndex(s => s.code === code);
            
            if(index !== -1) {
                // 1. Marquer comme vendu
                stock[index].vendu = true;
                stock[index].dateVente = new Date().toLocaleString();
                localStorage.setItem('aerio_stock', JSON.stringify(stock));

                // 2. Préparer l'impression
                const config = JSON.parse(localStorage.getItem('aerio_config')) || {};
                const tarifs = JSON.parse(localStorage.getItem('aerio_tarifs')) || [];
                const tarif = tarifs.find(t => t.id == stock[index].tarifId) || { nom: "Standard", prix: 0 };

                lancerImpression(code, tarif.nom, tarif.prix, config.currency || 'XAF', config.name || 'AERIO');

                // 3. Rafraîchir l'interface
                chargerVentes();
            }
        }

        function lancerImpression(code, offre, prix, devise, reseau) {
            const printSection = document.getElementById('printSection');
            printSection.style.display = "block";
            printSection.innerHTML = `
                <div style="width:280px; padding:20px; border:1px solid #000; font-family:sans-serif; text-align:center;">
                    <h2 style="margin:0; font-size:24px;">${reseau}</h2>
                    <p style="font-size:12px; margin-bottom:10px;">Accès WiFi Haut Débit</p>
                    <div style="border-top:1px dashed #000; border-bottom:1px dashed #000; padding:15px 0; margin:10px 0;">
                        <span style="font-size:10px; text-transform:uppercase;">Votre Code</span><br>
                        <strong style="font-size:32px;">${code}</strong>
                    </div>
                    <p style="font-weight:bold; font-size:16px;">PRIX : ${prix} ${devise}</p>
                    <p style="font-size:10px;">Offre : ${offre}</p>
                    <p style="font-size:9px; margin-top:15px;">Merci de votre confiance !</p>
                </div>
            `;
            window.print();
            printSection.style.display = "none";
        }

        window.onload = chargerVentes;
    </script>
</body>
</html>
