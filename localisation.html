        };

        function setLang(lang) {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (langData[lang][key]) el.innerText = langData[lang][key];
            });
            const searchInput = document.getElementById('searchInput');
            searchInput.placeholder = langData[lang].ph_search;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const targetBtn = document.getElementById(`btn-${lang}`);
            if(targetBtn) targetBtn.classList.add('active');
            localStorage.setItem('aerio_lang', lang);
        }

        function createNodes() {
            const map = document.getElementById('map');
            for (let i = 0; i < 8; i++) {
                const node = document.createElement('div');
                node.className = 'node';
                node.style.top = Math.random() * 80 + 10 + '%';
                node.style.left = Math.random() * 80 + 10 + '%';
                node.onclick = () => showNode(`Alpha-${Math.floor(Math.random() * 999)}`);
                map.appendChild(node);
            }
        }

        // ✅ MODIFICATION : Verrouillage sur Maroua
        function simulateGPS() {
            const currentLang = localStorage.getItem('aerio_lang') || 'fr';
            // Si le champ est vide, on utilise MAROUA par défaut
            const input = document.getElementById('searchInput').value || 'MAROUA, FAR NORTH';
            const nodesCountDisplay = document.getElementById('nodes-count');
            
            alert(`${langData[currentLang].alert_gps} ${input}\n${langData[currentLang].alert_searching}`);
            nodesCountDisplay.innerText = Math.floor(Math.random() * 50) + 150;
        }

        function showNode(name) {
            const currentLang = localStorage.getItem('aerio_lang') || 'fr';
            alert(`${langData[currentLang].node_active} ${name}\n${langData[currentLang].node_quality}\n${langData[currentLang].node_owner}`);
        }

        setInterval(() => {
            const rev = document.getElementById('revenue-live');
            if(rev) {
                let current = parseInt(rev.innerText.replace(/\s/g, '').replace('F', ''));
                current += Math.floor(Math.random() * 85);
                rev.innerText = current.toLocaleString() + " F";
            }
        }, 2500);

        window.onload = () => {
            createNodes();
            const savedLang = localStorage.getItem('aerio_lang') || 'fr';
            setLang(savedLang);
            // Log de confirmation dans la console
            console.log("AERIO Radar : Système initialisé sur le secteur Maroua.");
        };
    </script>
