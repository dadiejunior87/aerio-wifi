<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Grille Tarifaire Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C2FF; --accent: #00F5A0; --purple: #BC00FF;
            --bg-deep: #020617; --card-bg: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.08); --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-deep); color: white; display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-w); background: #0b0f1a; padding: 30px 15px; height: 100vh; position: fixed; border-right: 1px solid var(--border); }
        .logo-title { color: var(--primary); font-weight: 900; font-size: 24px; margin-bottom: 40px; }
        .nav-link { padding: 12px; color: #64748b; text-decoration: none; display: block; font-size: 13px; border-radius: 10px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link.active { background: rgba(0, 194, 255, 0.1); color: var(--primary); font-weight: 600; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.05); }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 30px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }

        /* --- GRID DES TARIFS --- */
        .tarif-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .tarif-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px;
            padding: 30px; position: relative; overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }
        .tarif-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0, 194, 255, 0.15); }

        .duration { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; }
        .price { font-size: 36px; font-weight: 900; color: white; margin: 10px 0; }
        .price span { font-size: 14px; color: var(--primary); margin-left: 5px; }

        /* ANALYTICS MINI */
        .card-analytics {
            margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between;
        }
        .stat-group { text-align: left; }
        .stat-val { font-size: 14px; font-weight: 800; color: var(--accent); display: block; }
        .stat-lab { font-size: 9px; color: #475569; text-transform: uppercase; font-weight: 600; }

        /* BADGES / ACTIONS */
        .badge-alpha { position: absolute; top: 20px; right: 20px; background: var(--purple); color: white; font-size: 9px; font-weight: 900; padding: 5px 12px; border-radius: 20px; }
        .btn-delete { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: none; padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .btn-delete:hover { background: #ff4757; color: white; }

        /* EMPTY STATE */
        .empty-grid { grid-column: 1 / -1; text-align: center; padding: 100px; background: rgba(255,255,255,0.02); border-radius: 30px; border: 1px dashed var(--border); }
        .btn-add { background: var(--primary); color: #020617; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 900; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0, 194, 255, 0.4); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-title">AERIO</div>
        <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
        <a href="ajouter-tarif.html" class="nav-link">💎 Ajouter un Tarif</a>
        <a href="liste-tarif.html" class="nav-link active">📜 Ma Grille Tarifaire</a>
        <a href="ajouter-ticket.html" class="nav-link">🎫 Générer un Pass</a>
        <a href="liste-tickets.html" class="nav-link">🔑 Registre des Accès</a>
    </div>

    <div class="main-content">
        <div class="header-flex">
            <div>
                <h1 style="font-size: 28px; font-weight: 900;">Optimiseur de <span style="color:var(--primary)">Revenus</span></h1>
                <p style="color: #64748b; font-size: 12px;">Gérez vos offres et surveillez leur performance.</p>
            </div>
            <button class="btn-add" onclick="window.location.href='ajouter-tarif.html'">+ CRÉER UNE OFFRE</button>
        </div>

        <div class="tarif-grid" id="gridTarifs">
            </div>
    </div>

    <script>
        function chargerTarifs() {
            const grid = document.getElementById('gridTarifs');
            const tarifs = JSON.parse(localStorage.getItem('aerio_tarifs')) || [];

            if (tarifs.length === 0) {
                grid.innerHTML = `
                    <div class="empty-grid">
                        <div style="font-size: 50px; margin-bottom: 20px; opacity: 0.2;">💎</div>
                        <h2 style="font-size: 18px; font-weight: 800; color: #64748b;">Aucun tarif configuré</h2>
                        <p style="color: #475569; font-size: 12px; margin-bottom: 25px;">Commencez par créer des offres pour générer des accès.</p>
                        <button class="btn-add" onclick="window.location.href='ajouter-tarif.html'">DÉFINIR MON PREMIER PRIX</button>
                    </div>`;
                return;
            }

            grid.innerHTML = ""; // Vider la grille avant de remplir
            
            tarifs.forEach((t, index) => {
                const card = document.createElement('div');
                card.className = 'tarif-card';
                card.innerHTML = `
                    <span class="badge-alpha">LIVE</span>
                    <p class="duration">${t.duree || 'Durée'} • ${t.nom}</p>
                    <div class="price">${t.prix}<span>XAF</span></div>
                    
                    <div class="card-analytics">
                        <div class="stat-group">
                            <span class="stat-val">0</span>
                            <span class="stat-lab">Ventes</span>
                        </div>
                        <div class="stat-group">
                            <span class="stat-val">0%</span>
                            <span class="stat-lab">Popularité</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="supprimerTarif(${index})">Supprimer l'offre</button>
                `;
                grid.appendChild(card);
            });
        }

        function supprimerTarif(index) {
            if(confirm("Voulez-vous vraiment supprimer cette offre ?")) {
                let tarifs = JSON.parse(localStorage.getItem('aerio_tarifs')) || [];
                tarifs.splice(index, 1);
                localStorage.setItem('aerio_tarifs', JSON.stringify(tarifs));
                chargerTarifs(); // Rafraîchir l'affichage
            }
        }

        // Charger au démarrage
        window.onload = chargerTarifs;
    </script>
</body>
</html>
