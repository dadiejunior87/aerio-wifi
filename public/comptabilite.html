<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Trésorerie & IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00C2FF; 
            --accent: #00F5A0; 
            --bg: #020617; 
            --card-bg: rgba(15, 23, 42, 0.7);
            --danger: #FF4B4B; 
            --border: rgba(255, 255, 255, 0.05);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: var(--bg); color: white; padding: 40px; min-height: 100vh; 
            background-image: radial-gradient(circle at top right, rgba(0, 194, 255, 0.1), transparent);
        }

        /* NAVIGATION */
        .top-nav-compta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .lang-switcher { display: flex; gap: 5px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 12px; border: 1px solid var(--border); }
        .lang-btn { background: none; border: none; color: #475569; font-size: 9px; font-weight: 900; cursor: pointer; padding: 6px 10px; border-radius: 8px; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: #020617; box-shadow: 0 0 10px var(--primary); }

        /* IA ADVISOR */
        .ai-predictor-box {
            background: linear-gradient(90deg, rgba(0, 194, 255, 0.1), rgba(188, 0, 255, 0.05));
            border: 1px solid rgba(0, 194, 255, 0.2);
            border-radius: 25px; padding: 25px; margin-bottom: 35px;
            display: flex; align-items: center; gap: 20px; position: relative;
        }

        /* STATUS CARDS */
        .status-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; margin-bottom: 40px; }
        .card-status { background: var(--card-bg); padding: 35px; border-radius: 35px; border: 1px solid var(--border); text-align: center; backdrop-filter: blur(10px); }

        /* WITHDRAW SECTION */
        .withdraw-section { background: var(--card-bg); padding: 45px; border-radius: 40px; border: 1px solid var(--border); max-width: 1000px; margin: 0 auto; backdrop-filter: blur(10px); }
        
        .operator-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px; margin: 20px 0 30px 0;
        }

        .op-card { cursor: pointer; position: relative; }
        .op-card input { position: absolute; opacity: 0; }
        .op-content {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 20px;
            padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.3s;
        }
        .op-content img { width: 45px; height: 45px; object-fit: contain; border-radius: 8px; }
        .op-content span { font-size: 11px; font-weight: 900; color: #475569; }

        .op-card input:checked + .op-content {
            border-color: var(--primary); background: rgba(0, 194, 255, 0.1); transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 194, 255, 0.1);
        }
        .op-card input:checked + .op-content span { color: var(--primary); }

        /* FORM */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        label { display: block; font-size: 10px; font-weight: 900; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        input { width: 100%; padding: 18px 25px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--border); border-radius: 20px; color: white; outline: none; }
        .btn-withdraw { grid-column: span 2; background: var(--accent); color: #020617; padding: 22px; border-radius: 20px; font-weight: 900; border: none; cursor: pointer; transition: 0.4s; margin-top: 15px; }
        .btn-withdraw:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0, 245, 160, 0.3); }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; }
        .toast-alpha { background: rgba(15, 23, 42, 0.95); border: 1px solid var(--primary); color: white; padding: 16px 30px; border-radius: 20px; font-weight: 800; animation: slideDownAlpha 0.5s forwards; }
        @keyframes slideDownAlpha { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="top-nav-compta">
        <div class="header-compta">
            <h1 data-lang="dash_nav_compta">Trésorerie <span style="color:var(--primary)">Alpha</span></h1>
            <p style="color: #475569; font-size: 13px;">Extraction sécurisée multisig.</p>
        </div>
        <div class="lang-switcher">
            <button onclick="setLang('fr')" class="lang-btn active">FR</button>
            <button onclick="setLang('en')" class="lang-btn">EN</button>
        </div>
    </div>

    <div class="ai-predictor-box">
        <div style="font-size: 30px;">🧠</div>
        <div>
            <p style="font-size: 12px; line-height: 1.6;">
                <span style="color: var(--primary); font-weight: 900;">AERIO AI :</span> Analyse des flux terminée. Vos gains sont prêts pour l'extraction.
            </p>
        </div>
    </div>

    <div class="status-grid">
        <div class="card-status">
            <div style="font-size:10px; color:#475569; font-weight:900; letter-spacing: 2px;">SOLDE RÉEL</div>
            <div id="balance-net" style="font-size:54px; font-weight:900;">0 F</div>
        </div>
        <div class="card-status" style="display: flex; flex-direction: column; justify-content: center;">
            <div style="color:var(--accent); font-weight:900;">COMPTE VÉRIFIÉ ✅</div>
            <p style="font-size: 10px; color: #475569; margin-top: 8px;">EXTRACTION PRIORITAIRE</p>
        </div>
    </div>

    <div class="withdraw-section">
        <h2 style="font-size: 18px; font-weight: 900; margin-bottom: 25px;">🚀 Choisir la Passerelle de Réception</h2>
        
        <form id="payoutForm">
            <div class="operator-grid">
                <label class="op-card">
                    <input type="radio" name="network" value="ORANGE" required>
                    <div class="op-content">
                        <img src="orange-logo.png">
                        <span>Orange</span>
                    </div>
                </label>
                <label class="op-card">
                    <input type="radio" name="network" value="MTN">
                    <div class="op-content">
                        <img src="mtn-logo.png">
                        <span>MTN</span>
                    </div>
                </label>
                <label class="op-card">
                    <input type="radio" name="network" value="AIRTEL">
                    <div class="op-content">
                        <img src="airtel-logo.png">
                        <span>Airtel</span>
                    </div>
                </label>
                <label class="op-card">
                    <input type="radio" name="network" value="MOOV">
                    <div class="op-content">
                        <img src="moov-logo.png">
                        <span>Moov</span>
                    </div>
                </label>
                <label class="op-card">
                    <input type="radio" name="network" value="WAVE">
                    <div class="op-content">
                        <img src="wave-logo.png">
                        <span>Wave</span>
                    </div>
                </label>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Numéro de téléphone</label>
                    <input type="text" id="phone" placeholder="Ex: 6XXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label>Montant (XAF)</label>
                    <input type="number" id="amount" placeholder="Min: 5 000" min="5000" required>
                </div>
                <button type="submit" class="btn-withdraw">🚀 Initialiser l'extraction Alpha</button>
            </div>
        </form>
    </div>

    <script src="/translations.js"></script>
    <script>
        function showNotify(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-alpha';
            toast.innerHTML = `<span>⚡</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        async function loadCompta() {
            try {
                const res = await fetch('/api/my-stats');
                const data = await res.json();
                document.getElementById('balance-net').innerText = Math.floor(data.summary.gain).toLocaleString() + " F";
                if(typeof applyTranslations === 'function') applyTranslations();
            } catch(e) { console.log("Synchro..."); }
        }

        document.getElementById('payoutForm').onsubmit = async (e) => {
            e.preventDefault();
            const op = document.querySelector('input[name="network"]:checked').value;
            showNotify(`PROTOCOLE ${op} : Extraction en cours... ✅`);
            setTimeout(() => window.location.reload(), 2000);
        };

        window.onload = loadCompta;
    </script>
</body>
</html>
