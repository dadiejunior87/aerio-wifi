<style>
    /* Style pour le tableau de saisie manuelle */
    .manual-table { width: 100%; margin-top: 20px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .manual-table input { border: none; border-radius: 0; margin: 0; background: rgba(255,255,255,0.02); }
    .manual-table input:focus { background: rgba(0, 194, 255, 0.05); }
    .add-row { background: none; border: 1px dashed var(--border); color: #64748b; padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; font-size: 11px; }
    .add-row:hover { color: var(--primary); border-color: var(--primary); }
</style>

<div class="content">
    <header style="margin-bottom: 40px;">
        <h1 style="font-size: 32px; font-weight: 900;">Architecte de <span style="color:var(--primary)">Flux</span></h1>
        <p style="color: #64748b;">Trois niveaux de puissance pour vos accès.</p>
    </header>

    <div class="mode-selector">
        <div class="mode-card" onclick="switchMode('simple', this)">
            <h3>✍️ Saisie Simple</h3>
            <p>Idéal pour quelques codes rapides.</p>
        </div>
        <div class="mode-card active" onclick="switchMode('manual', this)">
            <h3>⚡ Import Massive</h3>
            <p>Glissez vos fichiers CSV/Excel.</p>
        </div>
        <div class="mode-card" onclick="switchMode('cloud', this)">
            <h3>☁️ Auto-Sync Cloud</h3>
            <p>Automatisation totale à distance.</p>
        </div>
    </div>

    <div id="simple-panel" class="config-panel">
        <div class="grid-inputs">
            <div>
                <label>Zone WiFi</label>
                <select><option>-- Choisir --</option></select>
            </div>
            <div>
                <label>Tarif</label>
                <select><option>-- Choisir --</option></select>
            </div>
        </div>
        
        <label>Entrez vos codes manuellement</label>
        <div class="manual-table">
            <input type="text" placeholder="Entrez le code n°1 (ex: A72B-92)">
            <input type="text" placeholder="Entrez le code n°2">
            <input type="text" placeholder="Entrez le code n°3">
        </div>
        <button class="add-row">+ Ajouter plus de lignes</button>

        <button class="btn-deploy btn-manual" style="margin-top: 30px;">Valider ces accès</button>
    </div>

    <div id="manual-panel" class="config-panel active">
        <div class="drop-zone">
            <span style="font-size: 30px;">📂</span>
            <p>Glissez vos CSV ici</p>
        </div>
        <button class="btn-deploy btn-manual">Lancer l'injection massive</button>
    </div>

    <div id="cloud-panel" class="config-panel">
        <input type="text" placeholder="URL du Cloud">
        <button class="btn-deploy btn-auto" style="margin-top: 20px;">Activer le Pilote Automatique</button>
    </div>
</div>

<script>
    function switchMode(mode, element) {
        document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        document.querySelectorAll('.config-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(mode + '-panel').classList.add('active');
    }
</script>
