<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Générateur de Flux</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00C2FF; 
            --bg: #020617; 
            --glass: rgba(15, 23, 42, 0.7); 
            --accent: #00F5A0; 
            --surface: rgba(255, 255, 255, 0.03);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: white; 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 194, 255, 0.08), transparent);
            padding: 20px;
        }

        .generator-card {
            width: 100%;
            max-width: 850px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Effet de scan décoratif */
        .generator-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--primary), transparent 30%);
            animation: rotate 10s linear infinite;
            opacity: 0.05;
            z-index: -1;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .header h1 { font-weight: 900; font-size: 32px; letter-spacing: -1px; }
        .header p { color: var(--primary); font-size: 11px; font-weight: 900; letter-spacing: 2px; }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }

        .input-group { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 10px; font-weight: 900; color: #475569; letter-spacing: 1px; text-transform: uppercase; }

        select, input {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--primary); background: rgba(0, 194, 255, 0.05); }

        /* ✅ ZONE EXCLUSIVE : DASHBOARD DE PRÉVISUALISATION */
        .preview-pane {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(0, 194, 255, 0.1);
        }
        .preview-item { text-align: center; }
        .preview-item span { display: block; font-size: 9px; color: #475569; font-weight: 900; margin-bottom: 5px; }
        .preview-item b { font-size: 18px; color: var(--accent); }

        .action-area { display: flex; gap: 20px; margin-top: 40px; }
        
        .btn-generate {
            flex: 2;
            background: var(--primary);
            color: #020617;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0, 194, 255, 0.3);
            transition: 0.3s;
        }
        .btn-generate:hover { transform: translateY(-5px); filter: brightness(1.1); }

        .btn-cancel {
            flex: 1;
            background: rgba(255, 75, 75, 0.1);
            color: #FF4B4B;
            border: 1px solid rgba(255, 75, 75, 0.2);
            padding: 20px;
            border-radius: 20px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-cancel:hover { background: #FF4B4B; color: white; }

        .csv-hint {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 15px;
            font-size: 10px;
            color: #64748b;
            border-left: 3px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="generator-card">
        <div class="header">
            <div>
                <p>MOTEUR DE GÉNÉRATION ALPHA</p>
                <h1>Nouveau Flux <span style="color:var(--primary)">AERIO</span></h1>
            </div>
            <button onclick="location.href='liste-tickets.html'" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:8px 15px; border-radius:10px; font-size:9px; font-weight:900; cursor:pointer;">CONSULTER L'INVENTAIRE</button>
        </div>

        <div class="grid-inputs">
            <div class="input-group">
                <label>📍 Cible de Diffusion (WiFi Zone)</label>
                <select id="zone">
                    <option value="">-- Sélectionner un Nœud --</option>
                    <option value="1">Douala - Bonanjo Centre</option>
                    <option value="2">Yaoundé - Bastos Air</option>
                </select>
            </div>
            <div class="input-group">
                <label>💎 Configuration Tarifaire</label>
                <select id="tarif" onchange="updatePreview()">
                    <option value="0">-- Choisir un profil --</option>
                    <option value="100">Starter (100 F - 1H)</option>
                    <option value="500">Gamer (500 F - 24H)</option>
                    <option value="2500">Business (2500 F - 7 Jours)</option>
                </select>
            </div>
            <div class="input-group">
                <label>🔢 Quantité à Produire</label>
                <input type="number" id="qty" placeholder="Ex: 50" oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>📤 Source de Données (Optionnel)</label>
                <input type="file" id="file" style="font-size: 10px;">
            </div>
        </div>

        <div class="preview-pane">
            <div class="preview-item">
                <span>VALEUR UNITAIRE</span>
                <b id="val-unit">0 F</b>
            </div>
            <div class="preview-item">
                <span>VOLUME TOTAL</span>
                <b id="val-qty">0</b>
            </div>
            <div class="preview-item" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 20px;">
                <span>RECETTE ESTIMÉE</span>
                <b id="val-total" style="color:var(--primary)">0 F</b>
            </div>
        </div>

        <div class="action-area">
            <button class="btn-cancel" onclick="history.back()">ABANDONNER</button>
            <button class="btn-generate" onclick="startGeneration()">DÉPLOYER LES TICKETS</button>
        </div>

        <div class="csv-hint">
            <b>INFO ALPHA :</b> Si vous n'importez pas de fichier CSV, AERIO générera automatiquement des codes sécurisés haute-performance compatibles avec votre script MikroTik actuel.
        </div>
    </div>

    <script>
        function updatePreview() {
            const tarif = document.getElementById('tarif').value;
            const qty = document.getElementById('qty').value || 0;
            
            document.getElementById('val-unit').innerText = tarif + " F";
            document.getElementById('val-qty').innerText = qty;
            document.getElementById('val-total').innerText = (tarif * qty) + " F";
        }

        function startGeneration() {
            const btn = document.querySelector('.btn-generate');
            btn.innerText = "DÉPLOIEMENT EN COURS...";
            btn.style.background = "var(--accent)";
            
            setTimeout(() => {
                alert("🚀 SUCCÈS : Les tickets ont été injectés dans votre inventaire et sont prêts pour la vente.");
                window.location.href = 'liste-tickets.html';
            }, 2000);
        }
    </script>
</body>
</html>
