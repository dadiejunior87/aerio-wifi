<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Générateur Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C2FF; --accent: #00F5A0; --purple: #BC00FF;
            --bg-deep: #020617; --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.05); --sidebar-w: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-deep); color: white; display: flex; min-height: 100vh; }

        /* --- SIDEBAR SYNC --- */
        .sidebar { width: var(--sidebar-w); background: #0b0f1a; padding: 30px 15px; height: 100vh; position: fixed; border-right: 1px solid var(--border); }
        .logo-title { color: var(--primary); font-weight: 900; font-size: 26px; margin-bottom: 35px; padding-left: 10px; }
        .nav-button { background: rgba(255,255,255,0.02); padding: 12px 15px; border-radius: 12px; display: flex; text-decoration: none; font-size: 12px; margin-bottom: 5px; color: #94a3b8; border: 1px solid var(--border); }
        .nav-button.active { border-left: 4px solid var(--primary); background: rgba(0, 194, 255, 0.1); color: var(--primary); }

        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 40px; }

        /* --- TABS --- */
        .import-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: rgba(15, 23, 42, 0.5); padding: 5px; border-radius: 15px; border: 1px solid var(--border); width: fit-content; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; border: none; background: transparent; color: #64748b; font-size: 11px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: var(--primary); color: #020617; }

        .module-card { display: none; background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; padding: 40px; }
        .module-card.active { display: block; }

        /* --- EMPTY STATE STYLE --- */
        .empty-select { color: #475569; font-style: italic; }
        
        input, select { width: 100%; background: #020617; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; margin-top: 10px; margin-bottom: 20px; outline: none; }
        .btn-deploy { width: 100%; background: var(--primary); color: #020617; padding: 18px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; }
        
        .drop-zone { border: 2px dashed var(--border); border-radius: 20px; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-title">AERIO</div>
        <div style="font-size: 9px; color: #475569; font-weight: 900; text-transform: uppercase; margin: 25px 0 10px 10px;">Offres & Accès</div>
        <a href="ajouter-tarif.html" class="nav-button"><i>💎</i> Créer un Tarif</a>
        <a href="liste-tarif.html" class="nav-button"><i>📜</i> Ma Grille Tarifaire</a>
        <a href="ajouter-ticket.html" class="nav-button active"><i>🎫</i> Générer un Pass</a>
        <a href="liste-tickets.html" class="nav-button"><i>🔑</i> Registre des Accès</a>
    </div>

    <div class="main-content">
        <div style="margin-bottom: 30px;">
            <span style="background:var(--accent); color:#020617; padding:4px 12px; border-radius:20px; font-size:9px; font-weight:900;">ALPHA ENGINE</span>
            <h1 style="font-size: 32px; font-weight: 900; margin-top: 10px;">Production de <span style="color:var(--primary)">Pass</span></h1>
            <p style="color:#64748b; font-size:13px;">Initialisez votre réseau en créant vos premiers accès.</p>
        </div>

        <div class="import-tabs">
            <button class="tab-btn active" onclick="switchTab('manuel')">Générateur Manuel</button>
            <button class="tab-btn" onclick="switchTab('csv')">Import CSV</button>
            <button class="tab-btn" onclick="switchTab('auto')">Auto-Sync</button>
        </div>

        <div id="manuel" class="module-card active">
            <label style="font-size: 10px; font-weight: 900; color: #64748b;">SÉLECTIONNER UN FORFAIT DISPONIBLE</label>
            <select id="tarifSelect">
                <option value="" class="empty-select">-- Aucun forfait créé pour le moment --</option>
            </select>
            <p style="font-size: 10px; color: var(--primary); margin-top: -10px; margin-bottom: 20px;">
                <a href="ajouter-tarif.html" style="color: var(--primary); text-decoration: none;">+ Créer mon premier tarif ici</a>
            </p>
            
            <label style="font-size: 10px; font-weight: 900; color: #64748b;">QUANTITÉ</label>
            <input type="number" placeholder="0">
            <button class="btn-deploy" disabled style="opacity: 0.5; cursor: not-allowed;">Production Verrouillée</button>
        </div>

        <div id="csv" class="module-card">
            <div class="drop-zone">
                <p style="color: #475569;">Aucun fichier sélectionné</p>
            </div>
            <button class="btn-deploy" disabled style="margin-top: 20px; opacity: 0.5;">En attente de fichier...</button>
        </div>

        <div id="auto" class="module-card">
            <label style="font-size: 10px; font-weight: 900; color: #64748b;">URL SOURCE</label>
            <input type="text" placeholder="https://votre-lien-cloud.com/data">
            <button class="btn-deploy" style="background: var(--purple); color: white;">Établir la connexion</button>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.module-card').forEach(card => card.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
