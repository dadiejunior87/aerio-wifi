<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Injecteur de Tickets Alpha</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #00C2FF; --accent: #00F5A0; --bg: #020617; --glass: rgba(15, 23, 42, 0.7); --danger: #FF4B4B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; background-image: radial-gradient(circle at bottom right, rgba(0, 194, 255, 0.05), transparent); overflow-x: hidden; }

        /* ✅ NOTIFICATIONS TOAST ALPHA */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; }
        .toast-alpha { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border: 1px solid var(--primary); color: white; padding: 16px 30px; border-radius: 20px; font-weight: 800; font-size: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: slideDownAlpha 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideDownAlpha { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }

        .card-injector { background: var(--glass); backdrop-filter: blur(30px); padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); width: 95%; max-width: 550px; text-align: center; }
        h1 { font-size: 24px; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; letter-spacing: -1px; }
        
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { background: none; border: none; color: #475569; font-weight: 800; cursor: pointer; padding: 10px 20px; transition: 0.3s; font-size: 11px; letter-spacing: 1px; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 9px; font-weight: 900; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; margin-left: 10px; letter-spacing: 1px; }
        input { width: 100%; padding: 16px 20px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); border-radius: 15px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(0, 194, 255, 0.05); }

        .btn-inject { width: 100%; padding: 18px; border-radius: 15px; background: var(--primary); color: #020617; font-weight: 900; border: none; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-inject:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 194, 255, 0.3); }
        
        .csv-box { border: 2px dashed rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; margin-top: 15px; transition: 0.3s; cursor: pointer; }
        .csv-box:hover { border-color: var(--primary); background: rgba(0, 194, 255, 0.05); }

        .back-link { display: block; margin-top: 25px; color: #475569; text-decoration: none; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    
    <div class="card-injector">
        <h1>Injecteur <span style="color:var(--primary)">Alpha</span></h1>
        
        <div class="tabs">
            <button class="tab-btn active" id="btn-manual" onclick="switchTab('manual')">MANUEL</button>
            <button class="tab-btn" id="btn-massive" onclick="switchTab('massive')">MASSCHIF (.CSV)</button>
        </div>

        <!-- ✅ FORMULAIRE MASSCHIF (.CSV) -->
        <form id="massiveForm" style="display: none;" onsubmit="handleMassiveInjection(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>Tarif Unitaire (F)</label><input type="number" id="m-amount" placeholder="Ex: 100" required></div>
                <div class="form-group"><label>Durée Session</label><input type="text" id="m-duration" placeholder="Ex: 1H" required></div>
            </div>
            <div class="csv-box" onclick="document.getElementById('csvFile').click()">
                <label style="margin-left: 0; cursor: pointer;">📂 CLIQUEZ POUR IMPORTER LE .CSV</label>
                <input type="file" id="csvFile" accept=".csv" style="display: none;">
                <p id="fileName" style="font-size: 10px; color: var(--accent); margin-top: 10px; display: none;"></p>
            </div>
            <button type="submit" class="btn-inject">🚀 Lancer l'injection massive</button>
        </form>

        <!-- ✅ FORMULAIRE MANUEL -->
        <form id="manualForm" onsubmit="handleManualInjection(event)">
            <div class="form-group"><label>Code WiFi</label><input type="text" id="code" placeholder="Ex: AE-88HS" required></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>Valeur (F)</label><input type="number" id="amount" required></div>
                <div class="form-group"><label>Durée</label><input type="text" id="duration" placeholder="Ex: 1H" required></div>
            </div>
            <button type="submit" class="btn-inject">Injecter au Système</button>
        </form>

        <!-- ✅ LIEN DE RETOUR CORRIGÉ (SANS LE SLASH) -->
        <a href="dashboard.html" class="back-link">← ANNULER LA MISSION</a>
    </div>

    <script>
        function showNotify(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-alpha`;
            toast.innerHTML = `<span>⚡</span> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function switchTab(type) {
            document.getElementById('manualForm').style.display = type === 'manual' ? 'block' : 'none';
            document.getElementById('massiveForm').style.display = type === 'massive' ? 'block' : 'none';
            document.getElementById('btn-manual').classList.toggle('active', type === 'manual');
            document.getElementById('btn-massive').classList.toggle('active', type === 'massive');
        }

        document.getElementById('csvFile').onchange = function() {
            const name = this.files[0]?.name;
            if(name) {
                document.getElementById('fileName').innerText = `Fichier détecté : ${name}`;
                document.getElementById('fileName').style.display = 'block';
            }
        };

        function handleManualInjection(e) {
            e.preventDefault();
            showNotify("✅ SUCCÈS : Ticket injecté avec succès.");
            setTimeout(() => window.location.href = "dashboard.html", 1500);
        }

        function handleMassiveInjection(e) {
            e.preventDefault();
            const file = document.getElementById('csvFile').files[0];
            if(!file) return showNotify("❌ ERREUR : Fichier manquant.");
            showNotify(`🛰️ ANALYSE : Injection massive en cours...`);
            setTimeout(() => {
                showNotify("✅ SUCCÈS : Base de données synchronisée.");
                window.location.href = "dashboard.html";
            }, 2000);
        }
    </script>
</body>
</html>
