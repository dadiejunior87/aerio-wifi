<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Configuration de Vente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00C2FF; 
            --bg: #020617; 
            --glass: rgba(15, 23, 42, 0.7); 
            --accent: #00F5A0; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: var(--bg); 
            color: white; 
            padding: 40px;
            background-image: radial-gradient(circle at bottom left, rgba(0, 194, 255, 0.05), transparent);
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: 900; font-size: 11px; letter-spacing: 1px; }

        .form-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        h1 { font-weight: 900; font-size: 28px; margin-bottom: 10px; }
        .subtitle { color: #64748b; font-size: 12px; margin-bottom: 30px; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 10px; font-weight: 900; color: #64748b; letter-spacing: 1.5px; margin-bottom: 10px; text-transform: uppercase; }
        
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(0, 194, 255, 0.05); }

        .profit-preview {
            background: rgba(0, 245, 160, 0.05);
            border: 1px dashed var(--accent);
            padding: 20px;
            border-radius: 20px;
            margin: 30px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profit-value { font-weight: 900; color: var(--accent); font-size: 22px; }

        .btn-generate {
            width: 100%;
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-generate:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(0, 194, 255, 0.3); }
    </style>
</head>
<body>

    <div class="container">
        <a href="dashboard.html" class="back-link">← ANNULER L'OPÉRATION</a>
        
        <div class="form-card">
            <p style="color: var(--primary); font-size: 10px; font-weight: 900; letter-spacing: 2px;">CONFIGURATEUR DE FLUX</p>
            <h1>Créer vos <span style="color:var(--primary)">Tarifs</span></h1>
            <p class="subtitle">Définissez vos propres prix et durées de connexion pour vos clients.</p>

            <div class="input-grid">
                <div class="input-group">
                    <label>Nom du Forfait (ex: Pass 2H)</label>
                    <input type="text" id="ticket-name" placeholder="Ex: Super Rapide">
                </div>
                <div class="input-group">
                    <label>Durée (ex: 02:00:00)</label>
                    <input type="text" id="ticket-duration" placeholder="HH:MM:SS">
                </div>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Prix Unitaire (FCFA)</label>
                    <input type="number" id="ticket-price" placeholder="0" oninput="calculateProfit()">
                </div>
                <div class="input-group">
                    <label>Nombre de Tickets</label>
                    <input type="number" id="ticket-qty" placeholder="0" oninput="calculateProfit()">
                </div>
            </div>

            <div class="profit-preview">
                <div>
                    <span style="font-size: 12px; font-weight: 600; display: block;">Chiffre d'affaires prévu :</span>
                    <small style="color: #64748b; font-size: 10px;">Basé sur vos tarifs personnels</small>
                </div>
                <span class="profit-value" id="total-profit">0 FCFA</span>
            </div>

            <button class="btn-generate" onclick="generateAction()">Générer le lot de tickets</button>
        </div>
    </div>

    <script>
        function calculateProfit() {
            const price = document.getElementById('ticket-price').value || 0;
            const qty = document.getElementById('ticket-qty').value || 0;
            const total = price * qty;
            document.getElementById('total-profit').innerText = total.toLocaleString() + " FCFA";
        }

        function generateAction() {
            const name = document.getElementById('ticket-name').value;
            const price = document.getElementById('ticket-price').value;
            
            if(!name || !price) {
                alert("⚠️ Veuillez configurer un nom et un prix pour vos tickets.");
                return;
            }

            alert("🚀 Protocole de génération lancé...\nForfait : " + name + "\nPrix : " + price + " FCFA\nStatut : EN ATTENTE DE SYNCHRO MIKROTIK");
        }
    </script>
</body>
</html>
