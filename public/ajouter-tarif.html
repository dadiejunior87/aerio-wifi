<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Créateur d'Offres</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C2FF; --accent: #00F5A0; --purple: #BC00FF;
            --bg-deep: #020617; --card-bg: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.08); --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-deep); color: white; display: flex; min-height: 100vh; }

        /* --- SIDEBAR SYNC --- */
        .sidebar { width: var(--sidebar-w); background: #0b0f1a; padding: 30px 15px; height: 100vh; position: fixed; border-right: 1px solid var(--border); }
        .logo-title { color: var(--primary); font-weight: 900; font-size: 24px; margin-bottom: 40px; }
        .nav-link { padding: 12px; color: #64748b; text-decoration: none; display: block; font-size: 13px; border-radius: 10px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link.active { background: rgba(0, 194, 255, 0.1); color: var(--primary); font-weight: 600; }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 40px; }
        
        .config-wrapper { max-width: 900px; margin: 0 auto; }
        .section-header { margin-bottom: 35px; }
        .section-header h1 { font-size: 30px; font-weight: 900; }

        /* --- CONFIG CARD --- */
        .config-card { background: var(--card-bg); border-radius: 35px; border: 1px solid var(--border); padding: 40px; backdrop-filter: blur(20px); position: relative; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .input-box { margin-bottom: 25px; }
        label { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: block; }
        
        input, select { 
            width: 100%; background: rgba(2, 6, 23, 0.9); border: 1px solid var(--border); 
            padding: 18px; border-radius: 16px; color: white; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 194, 255, 0.1); }

        /* --- LIVE PREVIEW --- */
        .live-preview {
            background: linear-gradient(135deg, rgba(188, 0, 255, 0.05) 0%, rgba(0, 194, 255, 0.05) 100%);
            border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-top: 30px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .btn-save { 
            width: 100%; padding: 20px; border-radius: 18px; border: none; background: var(--primary); 
            color: #020617; font-weight: 900; font-size: 14px; text-transform: uppercase; 
            cursor: pointer; margin-top: 30px; transition: 0.3s;
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 194, 255, 0.4); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-title">AERIO</div>
        <a href="#" class="nav-link">🏠 Dashboard</a>
        <a href="ajouter-tarif.html" class="nav-link active">💎 Ajouter un Tarif</a>
        <a href="liste-tarif.html" class="nav-link">📜 Ma Grille Tarifaire</a>
        <a href="ajouter-ticket.html" class="nav-link">🎫 Générer un Pass</a>
        <a href="liste-tickets.html" class="nav-link">🔑 Registre des Accès</a>
    </div>

    <div class="main-content">
        <div class="config-wrapper">
            <div class="section-header">
                <span style="color:var(--primary); font-size:10px; font-weight:900; letter-spacing:3px;">FORGE DE PRIX</span>
                <h1>Nouveau <span style="color:var(--primary)">Tarif</span> Alpha</h1>
            </div>

            <div class="config-card">
                <div class="form-grid">
                    <div class="input-box">
                        <label>Nom de l'offre</label>
                        <input type="text" placeholder="Ex: Pass Gaming 2H">
                    </div>
                    <div class="input-box">
                        <label>Prix (XAF)</label>
                        <input type="number" placeholder="Ex: 500">
                    </div>
                    <div class="input-box">
                        <label>Durée de Connexion</label>
                        <select>
                            <option>-- Sélectionner --</option>
                            <option>30 Minutes</option>
                            <option>01 Heure</option>
                            <option>24 Heures</option>
                            <option>01 Semaine</option>
                        </select>
                    </div>
                    <div class="input-box">
                        <label>Limite de Vitesse (Burst)</label>
                        <select>
                            <option>Standard (2 Mbps)</option>
                            <option>High Speed (5 Mbps)</option>
                            <option>Unlimited (Max)</option>
                        </select>
                    </div>
                </div>

                <div class="live-preview">
                    <div>
                        <p style="font-size: 10px; color: #64748b; font-weight: 900;">PRÉVISUALISATION DU TICKET</p>
                        <h3 id="preview-text" style="color: var(--accent); margin-top: 5px;">Configurez vos options...</h3>
                    </div>
                    <div style="text-align: right;">
                        <span style="font-size: 24px; font-weight: 900; color: white;">0 XAF</span>
                    </div>
                </div>

                <button class="btn-save" onclick="saveTarif()">DÉPLOYER L'OFFRE SUR LA GRILLE</button>
            </div>
        </div>
    </div>

    <script>
        function saveTarif() {
            alert("🚀 OFFRE ALPHA CRÉÉE : Votre nouveau tarif est maintenant disponible pour la génération de tickets.");
            window.location.href = 'liste-tarif.html';
        }
    </script>
</body>
</html>
