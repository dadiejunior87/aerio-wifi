<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Connexion Espace Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00C2FF; 
            --bg: #020617; 
            --glass: rgba(15, 23, 42, 0.6); 
            --accent: #7000FF; 
            --neon-glow: rgba(0, 194, 255, 0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            /* Fond avec halos de lumière */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 194, 255, 0.05), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(112, 0, 255, 0.1), transparent 40%);
            overflow-y: auto; 
        }

        /* --- OVERLAY NOTIFICATION QUANTIQUE --- */
        .aerio-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }
        .quantum-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 40px var(--neon-glow);
            text-align: left;
        }

        /* --- SCANNER ALPHA --- */
        #scanner-line {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            z-index: 10000;
            animation: scanLoop 2s ease-in-out infinite;
        }
        @keyframes scanLoop { 0% { top: 0%; } 100% { top: 100%; } }

        /* --- LOGIN CARD HYPER-AERIO --- */
        .login-card { 
            background: var(--glass); 
            backdrop-filter: blur(30px); 
            padding: 45px 35px; 
            border-radius: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            position: relative; 
            transition: 0.5s;
        }
        .login-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--accent));
            z-index: -1; border-radius: 37px; opacity: 0.3;
        }

        .lang-switcher { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        .lang-btn { cursor: pointer; font-size: 18px; opacity: 0.3; transition: 0.4s; filter: grayscale(1); }
        .lang-btn.active { opacity: 1; filter: grayscale(0); transform: scale(1.3); }
        
        h1 { font-size: 26px; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.5px; text-transform: uppercase; color: #fff; }
        p#sub-text { color: #94a3b8; font-size: 13px; margin-bottom: 35px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 10px; font-weight: 900; color: var(--primary); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        input { 
            width: 100%; padding: 16px 20px; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 15px; 
            color: white; font-size: 14px; 
            outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 194, 255, 0.15); background: rgba(0,0,0,0.7); }

        .btn-login { 
            width: 100%; padding: 18px; 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; border-radius: 15px; 
            font-weight: 900; border: none; 
            cursor: pointer; text-transform: uppercase; 
            letter-spacing: 1.5px; margin-top: 15px; 
            transition: 0.4s; 
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 194, 255, 0.4); }

        .back-link { display: block; margin-top: 25px; color: #64748b; text-decoration: none; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .back-link:hover { color: var(--primary); }

        .logo-box {
            width: 65px; height: 65px;
            background: rgba(0, 194, 255, 0.05);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            border: 1px solid var(--primary);
            font-size: 28px;
            box-shadow: 0 0 20px rgba(0, 194, 255, 0.2);
        }

        /* Barre de progression notification */
        .prog-notif { width: 100%; height: 3px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 2px; overflow: hidden; }
        .bar-notif { width: 40%; height: 100%; background: var(--primary); animation: moveBar 1.5s infinite linear; }
        @keyframes moveBar { from { transform: translateX(-100%); } to { transform: translateX(300%); } }
    </style>
</head>
<body>

    <div id="scanner-line"></div>

    <div class="login-card">
        <div class="lang-switcher">
            <span class="lang-btn active" onclick="changeLang('fr')">🇫🇷</span>
            <span class="lang-btn" onclick="changeLang('en')">🇺🇸</span>
            <span class="lang-btn" onclick="changeLang('pt')">🇧🇷</span>
        </div>

        <div class="logo-box">🔒</div>
        <h1 data-key="title_pro">Espace Pro</h1>
        <p id="sub-text" data-key="hero_desc">Liaison sécurisée au cockpit de gestion AERIO.</p>

        <form id="loginForm" onsubmit="initierLiaisonAlpha(event)">
            <div class="input-group">
                <label data-key="label_id">Identifiant Agent Alpha</label>
                <input type="text" id="agentID" placeholder="Email ou ID" required>
            </div>
            <div class="input-group">
                <label data-key="label_key">Code de Cryptage</label>
                <input type="password" id="agentKey" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login" id="btnText" data-key="btn_init">Initialiser la Session</button>
        </form>

        <a href="index.html" class="back-link" data-key="btn_back">← Retour au Cockpit</a>
    </div>

    <script>
        function showQuantumAlert(message) {
            const alertHtml = `
            <div class="aerio-overlay" id="quantumAlert">
                <div class="quantum-card">
                    <div style="opacity: 0.5; font-size: 0.7rem; margin-bottom: 8px; color:var(--primary);">SYSTÈME ALPHA SECURE</div>
                    <div style="font-weight:900; letter-spacing:0.5px; margin-bottom:10px; font-size:1.1rem;">LIAISON ÉTABLIE</div>
                    <div style="font-size:0.85rem; color:#cbd5e1; line-height:1.4;">${message}</div>
                    <div class="prog-notif"><div class="bar-notif"></div></div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', alertHtml);
        }

        const langData = {
            fr: {
                title_pro: "Espace Pro",
                hero_desc: "Liaison sécurisée au cockpit de gestion AERIO.",
                label_id: "Identifiant Agent Alpha",
                ph_id: "Email ou ID",
                label_key: "Code de Cryptage",
                btn_init: "Initialiser la Session",
                btn_back: "← Retour au Cockpit",
                loading: "CRYPTAGE...",
                success: "Accès autorisé. Synchronisation du cockpit Alpha en cours."
            },
            en: {
                title_pro: "Pro Space",
                hero_desc: "Secure link to the AERIO management cockpit.",
                label_id: "Alpha Agent ID",
                ph_id: "Email or ID",
                label_key: "Encryption Code",
                btn_init: "Initialize Session",
                btn_back: "← Back to Cockpit",
                loading: "ENCRYPTING...",
                success: "Access granted. Synchronizing Alpha cockpit."
            },
            pt: {
                title_pro: "Espaço Pro",
                hero_desc: "Ligação segura ao cockpit de gestão AERIO.",
                label_id: "ID do Agente Alpha",
                ph_id: "E-mail ou ID",
                label_key: "Código de Criptografia",
                btn_init: "Inicializar Sessão",
                btn_back: "← Voltar ao Cockpit",
                loading: "CRIPTOGRAFANDO...",
                success: "Acesso concedido. Sincronizando o cockpit Alpha."
            }
        };

        function changeLang(lang) {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (langData[lang][key]) el.innerText = langData[lang][key];
            });
            document.getElementById('agentID').placeholder = langData[lang].ph_id;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            localStorage.setItem('aerio_lang', lang);
        }

        function initierLiaisonAlpha(e) {
            e.preventDefault();
            const currentLang = localStorage.getItem('aerio_lang') || 'fr';
            const btn = document.getElementById('btnText');
            const scanner = document.getElementById('scanner-line');
            
            scanner.style.display = 'block';
            btn.innerText = langData[currentLang].loading;
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";

            setTimeout(() => {
                showQuantumAlert(langData[currentLang].success);
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 2000);
            }, 1500);
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('aerio_lang') || 'fr';
            changeLang(savedLang);
            // Mise à jour visuelle des boutons de langue
            const btns = document.querySelectorAll('.lang-btn');
            btns.forEach(b => {
                b.classList.remove('active');
                if(b.innerText.includes('🇫🇷') && savedLang === 'fr') b.classList.add('active');
                if(b.innerText.includes('🇺🇸') && savedLang === 'en') b.classList.add('active');
                if(b.innerText.includes('🇧🇷') && savedLang === 'pt') b.classList.add('active');
            });
        };
    </script>
</body>
</html>
