<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Radar de Localisation Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00C2FF; --bg: #020617; --glass: rgba(15, 23, 42, 0.7); --accent: #00F5A0; --radar-line: rgba(0, 194, 255, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; padding: 40px 5%; background-image: radial-gradient(circle at top right, rgba(0, 194, 255, 0.08), transparent); overflow-x: hidden; }

        /* ✅ SÉLECTEUR DE LANGUE DISCRET */
        .top-nav-radar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .lang-switcher { display: flex; gap: 5px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .lang-btn { background: none; border: none; color: #475569; font-size: 8px; font-weight: 900; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: #020617; }

        /* ✅ HEADER STYLE "COMMAND CENTER" */
        .radar-header { text-align: center; margin-bottom: 40px; }
        .radar-header h1 { font-size: clamp(24px, 5vw, 40px); font-weight: 900; letter-spacing: -2px; text-transform: uppercase; }
        .radar-status { display: inline-block; padding: 8px 20px; background: rgba(0, 194, 255, 0.1); color: var(--primary); border-radius: 50px; font-size: 11px; font-weight: 900; border: 1px solid var(--primary); margin-top: 15px; letter-spacing: 2px; }

        /* ✅ RECHERCHE TACTIQUE */
        .search-container { max-width: 800px; margin: 0 auto 40px; background: var(--glass); backdrop-filter: blur(20px); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); display: flex; gap: 15px; }
        input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 15px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 194, 255, 0.2); }
        .btn-gps { background: var(--primary); color: #020617; padding: 0 30px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; white-space: nowrap; }

        /* ✅ INTERFACE MAP RADAR LIVE */
        .map-viewport { position: relative; width: 100%; height: 600px; border-radius: 40px; border: 2px solid var(--primary); overflow: hidden; background: #010409; box-shadow: 0 0 50px rgba(0, 194, 255, 0.1); }
        .map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,194,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,194,255,0.05) 1px, transparent 1px); background-size: 50px 50px; }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 20px var(--primary); opacity: 0.5; animation: scanMove 4s linear infinite; z-index: 5; }
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }

        /* Nœuds Pulsatiles */
        .node { position: absolute; width: 15px; height: 15px; background: var(--primary); border-radius: 50%; cursor: pointer; z-index: 10; transform: translate(-50%, -50%); transition: 0.3s; }
        .node:hover { background: var(--accent); scale: 1.5; }
        .node::before { content: ""; position: absolute; inset: -10px; border-radius: 50%; background: var(--primary); opacity: 0.2; animation: pulseNode 2s infinite; }
        @keyframes pulseNode { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.8); opacity: 0.4; } }

        .live-data-panel { position: absolute; top: 20px; right: 20px; width: 220px; background: rgba(0,0,0,0.7); border: 1px solid var(--primary); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px); z-index: 100; font-size: 10px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-family: 'Courier New', monospace; }

        /* ✅ LIEN DE RETOUR CORRIGÉ */
        .back-link { display: block; text-align: center; margin-top: 40px; color: #475569; text-decoration: none; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="top-nav-radar">
        <div class="lang-switcher">
            <button onclick="setLang('fr')" class="lang-btn active">FR</button>
            <button onclick="setLang('en')" class="lang-btn">EN</button>
            <button onclick="setLang('pt')" class="lang-btn">PT</button>
            <button onclick="setLang('es')" class="lang-btn">ES</button>
        </div>
    </div>

    <div class="radar-header">
        <h1 data-lang="nav_loc">Scanner Satellite <span style="color:var(--primary)">AERIO</span></h1>
        <div class="radar-status">🛰️ PROTOCOLE DE SCAN ALPHA ACTIF</div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="RECHERCHE DE RÉSEAU DANS VOTRE ZONE...">
        <button class="btn-gps" onclick="simulateGPS()">LANCER LE SCAN GPS</button>
    </div>

    <div class="map-viewport" id="map">
        <div class="map-grid"></div>
        <div class="scan-line"></div>
        
        <div class="live-data-panel">
            <p style="color:var(--primary); font-weight:900; margin-bottom:10px;">FLUX RÉSEAU LIVE</p>
            <div class="data-row"><span>NODES CONNECTÉS:</span> <span id="nodes-count" style="color:var(--accent);">142</span></div>
            <div class="data-row"><span>SIGNAL MOYEN:</span> <span style="color:var(--primary)">98.4%</span></div>
            <hr style="border:0; border-top:1px solid rgba(0,194,255,0.2); margin:10px 0;">
            <div class="data-row"><span>ENCOURS:</span> <span id="revenue-live">183 475 F</span></div>
        </div>

        </div>

    <a href="index.html" class="back-link">← <span data-lang="nav_home">RETOUR AU COCKPIT ALPHA</span></a>

    <script>
        // ✅ GÉNÉRATION DE NŒUDS ALÉATOIRES POUR LE RÉSEAU
        const map = document.getElementById('map');
        const nodesCountDisplay = document.getElementById('nodes-count');
        
        function createNodes() {
            for (let i = 0; i < 8; i++) {
                const node = document.createElement('div');
                node.className = 'node';
                node.style.top = Math.random() * 80 + 10 + '%';
                node.style.left = Math.random() * 80 + 10 + '%';
                node.onclick = () => showNode(`Alpha-${Math.floor(Math.random() * 999)}`);
                map.appendChild(node);
            }
        }

        function simulateGPS() {
            const input = document.getElementById('searchInput').value;
            alert(`🛰️ GPS VERROUILLÉ SUR : ${input || 'VOTRE POSITION'}\nRecherche de nœuds AERIO à proximité...`);
            // Simule une mise à jour
            nodesCountDisplay.innerText = Math.floor(Math.random() * 50) + 150;
        }

        function showNode(name) {
            alert(`📶 RÉSEAU ${name} : ACTIF\nQualité : Excellente\nPropriétaire : Partenaire AERIO Certifié`);
        }

        // ✅ COMPTEUR DE REVENUS LIVE
        setInterval(() => {
            const rev = document.getElementById('revenue-live');
            if(rev) {
                let current = parseInt(rev.innerText.replace(/\s/g, '').replace('F', ''));
                current += Math.floor(Math.random() * 85);
                rev.innerText = current.toLocaleString() + " F";
            }
        }, 2500);

        // Init
        createNodes();

        // Gestion Langues (Sécurité si translations.js est absent)
        function setLang(lang) {
            const btns = document.querySelectorAll('.lang-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            console.log("Langue changée vers : " + lang);
        }
    </script>
</body>
</html>
