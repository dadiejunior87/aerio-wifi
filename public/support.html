<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Support Intelligent</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00C2FF; --bg: #020617; --glass: rgba(15, 23, 42, 0.9); --accent: #00F5A0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .chat-container {
            width: 100%; max-width: 500px; height: 80vh; background: var(--glass);
            border: 1px solid rgba(0, 194, 255, 0.2); border-radius: 30px;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* --- HEADER AGENT --- */
        .chat-header {
            padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 15px;
        }
        .status-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        .agent-info b { font-size: 14px; display: block; }
        .agent-info span { font-size: 10px; color: #64748b; }

        /* --- ZONE DE MESSAGES VIDE --- */
        .chat-body { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        
        .ai-welcome-icon { font-size: 40px; margin-bottom: 20px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .welcome-text h2 { font-weight: 900; font-size: 18px; margin-bottom: 10px; }
        .welcome-text p { font-size: 12px; color: #94a3b8; line-height: 1.5; }

        /* --- INNOVATION : SMART BUBBLES --- */
        .suggestion-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 30px; }
        .suggest-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 194, 255, 0.1);
            padding: 12px; border-radius: 15px; color: var(--primary); font-size: 11px;
            cursor: pointer; transition: 0.3s; text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .suggest-btn:hover { background: rgba(0, 194, 255, 0.1); transform: translateX(5px); }

        /* --- INPUT --- */
        .chat-footer { padding: 20px; background: rgba(0,0,0,0.2); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .input-wrapper {
            background: #020617; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px; border-radius: 15px; display: flex; gap: 10px;
        }
        input { background: none; border: none; color: white; flex: 1; font-size: 12px; outline: none; }
        .send-btn { color: var(--primary); font-weight: 900; cursor: pointer; border: none; background: none; }

        .back-btn { position: absolute; top: -50px; left: 0; color: var(--primary); text-decoration: none; font-size: 12px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="chat-container">
        <a href="dashboard.html" class="back-btn">← QUITTER LE SUPPORT</a>

        <div class="chat-header">
            <div class="status-dot"></div>
            <div class="agent-info">
                <b>Agent AERIO Intelligence</b>
                <span>Système Alpha • En ligne</span>
            </div>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="ai-welcome-icon">🛰️</div>
            <div class="welcome-text">
                <h2>Bonjour Chef de Projet</h2>
                <p>Je suis l'IA AERIO. Je supervise votre infrastructure. Comment puis-je vous assister pour votre première configuration ?</p>
            </div>

            <div class="suggestion-grid">
                <button class="suggest-btn" onclick="askAI('Comment lier mon MikroTik ?')">
                    <i>📡</i> "Comment lier mon MikroTik à AERIO ?"
                </button>
                <button class="suggest-btn" onclick="askAI('Activer paiement Moneroo')">
                    <i>💰</i> "Activer le paiement Moneroo sans data"
                </button>
                <button class="suggest-btn" onclick="askAI('Vérifier ma licence')">
                    <i>🎖️</i> "Vérifier le statut de ma licence Agent"
                </button>
            </div>
        </div>

        <div class="chat-footer">
            <div class="input-wrapper">
                <input type="text" placeholder="Posez une question à l'IA...">
                <button class="send-btn">ENVOYER</button>
            </div>
        </div>
    </div>

    <script>
        function askAI(question) {
            const body = document.getElementById('chatBody');
            body.innerHTML = `
                <div style="text-align:left; margin-bottom:20px;">
                    <div style="background:var(--primary); color:black; padding:12px; border-radius:15px; display:inline-block; font-size:12px; font-weight:600;">\${question}</div>
                </div>
                <div style="text-align:left;">
                    <div style="color:var(--accent); font-size:11px; font-weight:900; margin-bottom:5px;">AGENT AERIO</div>
                    <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; font-size:12px; line-height:1.6;">
                        Analyse du protocole en cours... ⚙️<br>
                        Je prépare les instructions spécifiques pour votre nœud. Un instant.
                    </div>
                </div>
            `;
            
            // Simulation de redirection ou réponse après 2 secondes
            setTimeout(() => {
                alert("L'IA est prête. Voulez-vous être redirigé vers la documentation technique ?");
                window.location.href = 'docs.html';
            }, 2500);
        }
    </script>
</body>
</html>
