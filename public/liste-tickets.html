<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AERIO | Registre des Accès</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C2FF; --accent: #00F5A0; --purple: #BC00FF;
            --bg-deep: #020617; --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.05); --sidebar-w: 280px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-deep); color: white; display: flex; min-height: 100vh; }

        .sidebar { width: var(--sidebar-w); background: #0b0f1a; padding: 30px 15px; height: 100vh; position: fixed; border-right: 1px solid var(--border); }
        .content { margin-left: var(--sidebar-w); flex: 1; padding: 40px; }

        /* --- TABLE STYLE --- */
        .table-container { background: var(--card-bg); border-radius: 25px; border: 1px solid var(--border); padding: 25px; min-height: 400px; display: flex; flex-direction: column; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 10px; color: #64748b; text-transform: uppercase; border-bottom: 1px solid var(--border); }

        /* --- EMPTY STATE (L'état quand c'est vide) --- */
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #475569; text-align: center; }
        .empty-icon { font-size: 50px; margin-bottom: 15px; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="sidebar">
        </div>

    <div class="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1 style="font-size: 28px; font-weight: 900;">Registre des <span style="color:var(--primary)">Accès</span></h1>
                <p style="color: #64748b; font-size: 12px;">Monitoring en temps réel des flux de connexion.</p>
            </div>
            <button style="background: rgba(255,255,255,0.05); color: #475569; border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; font-weight: 900; font-size: 11px; cursor: not-allowed;">EXPORTER (.XLSX)</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Code d'Accès</th>
                        <th>Forfait</th>
                        <th>Source</th>
                        <th>Date d'Activation</th>
                        <th>Statut</th>
                    </tr>
                </thead>
            </table>

            <div class="empty-state">
                <div class="empty-icon">📂</div>
                <p style="font-weight: 600;">Aucun pass généré pour le moment</p>
                <p style="font-size: 12px; margin-top: 5px;">Les accès créés ou importés apparaîtront ici automatiquement.</p>
                <a href="ajouter-ticket.html" style="margin-top: 20px; color: var(--primary); text-decoration: none; font-size: 12px; font-weight: 900;">+ GÉNÉRER MON PREMIER PASS</a>
            </div>
        </div>
    </div>

</body>
</html>
