<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Inventaire des Tickets</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00C2FF; 
            --bg: #020617; 
            --glass: rgba(15, 23, 42, 0.7); 
            --accent: #00F5A0; 
            --border: rgba(255, 255, 255, 0.05);
            --sidebar-w: 280px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background: var(--bg); color: white; display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-w); background: #0b0f1a; padding: 30px 15px; height: 100vh; position: fixed; border-right: 1px solid var(--border); z-index: 100; }
        .logo-title { color: var(--primary); font-weight: 900; font-size: 26px; margin-bottom: 35px; }
        .group-label { font-size: 10px; color: #475569; font-weight: 800; letter-spacing: 1px; margin: 20px 0 10px 10px; text-transform: uppercase; }
        .nav-button { background: rgba(255,255,255,0.02); padding: 12px 15px; border-radius: 12px; display: flex; text-decoration: none; font-size: 12px; margin-bottom: 5px; color: #94a3b8; border: 1px solid var(--border); transition: 0.3s; }
        .nav-button.active { border-left: 4px solid var(--primary); background: rgba(0, 194, 255, 0.1); color: var(--primary); }

        /* --- MAIN WRAPPER --- */
        .main-wrapper { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }

        /* --- TOP BAR & NOTIFICATIONS --- */
        .top-bar { display: flex; justify-content: flex-end; align-items: center; padding: 20px 40px; width: 100%; }
        .notif-wrapper { position: relative; z-index: 1001; }
        .notif-trigger {
            background: var(--glass); border: 1px solid var(--border);
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-size: 20px;
        }
        .notif-badge {
            position: absolute; top: -5px; right: -5px;
            background: #ff4b4b; color: white; font-size: 9px; font-weight: 900;
            padding: 2px 6px; border-radius: 50%; border: 2px solid var(--bg);
        }
        .notif-dropdown {
            position: absolute; top: 60px; right: 0; width: 300px;
            background: #0f172a; border: 1px solid var(--border);
            border-radius: 20px; padding: 15px; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .notif-dropdown.active { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
        .notif-item { display: flex; gap: 12px; padding: 10px; border-radius: 10px; margin-bottom: 5px; font-size: 11px; }

        /* --- CONTENT AREA (Ta carte de génération) --- */
        .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .generator-card {
            width: 100%; max-width: 850px; background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 40px; border: 1px solid var(--border); padding: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .header h1 { font-weight: 900; font-size: 32px; letter-spacing: -1px; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 10px; font-weight: 900; color: #475569; letter-spacing: 1px; text-transform: uppercase; }

        select, input {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px; border-radius: 15px; color: white; font-size: 14px; outline: none;
        }

        .preview-pane {
            background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 20px;
            margin-bottom: 30px; display: flex; justify-content: space-around;
            border: 1px solid rgba(0, 194, 255, 0.1);
        }

        .action-area { display: flex; gap: 20px; margin-top: 40px; }
        .btn-generate { flex: 2; background: var(--primary); color: #020617; border: none; padding: 20px; border-radius: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-cancel { flex: 1; background: rgba(255, 75, 75, 0.1); color: #FF4B4B; border: 1px solid rgba(255, 75, 75, 0.2); padding: 20px; border-radius: 20px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-title">AERIO</div>
        <div class="group-label">Pilotage Réseaux</div>
        <a href="dashboard.html" class="nav-button"><i>🏠</i> Tableau de bord</a>
        <div class="group-label">Offres & Accès</div>
        <a href="ajouter-tarif.html" class="nav-button"><i>💎</i> Créer un Forfait</a>
        <a href="liste-tarif.html" class="nav-button"><i>📜</i> Ma Grille Tarifaire</a>
        <a href="ajouter-ticket.html" class="nav-button"><i>🎫</i> Générer un Pass</a>
        <a href="liste-tickets.html" class="nav-button active"><i>🔑</i> Registre des Accès</a>
    </div>

    <div class="main-wrapper">
        <div class="top-bar">
            <div class="notif-wrapper">
                <div class="notif-trigger" onclick="toggleNotifs()">
                    🔔 <span class="notif-badge">3</span>
                </div>
                <div class="notif-dropdown" id="notifDropdown">
                    <div style="font-size: 10px; font-weight: 900; color: #475569; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">ALERTES ALPHA</div>
                    <div class="notif-item">💰 Nouveau paiement : 500 XAF</div>
                    <div class="notif-item">📡 Antenne Principale : En ligne</div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="generator-card">
                <div class="header">
                    <div>
                        <p style="color:var(--primary); font-size:11px; font-weight:900; letter-spacing:2px;">MOTEUR DE GÉNÉRATION ALPHA</p>
                        <h1>Nouveau Flux <span style="color:var(--primary)">AERIO</span></h1>
                    </div>
                </div>
                
                <div class="grid-inputs">
                    </div>

                <div class="preview-pane">
                    </div>

                <div class="action-area">
                    <button class="btn-cancel" onclick="history.back()">ABANDONNER</button>
                    <button class="btn-generate" onclick="startGeneration()">DÉPLOYER LES TICKETS</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleNotifs() {
            document.getElementById('notifDropdown').classList.toggle('active');
        }
        function updatePreview() {
            const tarif = document.getElementById('tarif').value;
            const qty = document.getElementById('qty').value || 0;
            document.getElementById('val-unit').innerText = tarif + " F";
            document.getElementById('val-qty').innerText = qty;
            document.getElementById('val-total').innerText = (tarif * qty) + " F";
        }
        function startGeneration() {
            alert("🚀 Déploiement réussi !");
            window.location.href = 'liste-tickets.html';
        }
    </script>
</body>
</html>
