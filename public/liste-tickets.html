<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Registre des Accès</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #00C2FF; --accent: #00F5A0; --warning: #FFAB00; --danger: #ff4757;
            --bg-deep: #020617; --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08); --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: var(--bg-deep); color: white; display: flex; min-height: 100vh;
            background-image: radial-gradient(circle at bottom left, rgba(0, 194, 255, 0.03), transparent 40%);
        }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-w); background: #0b0f1a; padding: 30px 20px; height: 100vh; position: fixed; border-right: 1px solid var(--border); z-index: 100; }
        .logo-title { color: var(--primary); font-weight: 900; font-size: 24px; margin-bottom: 40px; letter-spacing: -1px; }
        .nav-link { padding: 14px 18px; color: #64748b; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 13px; border-radius: 12px; transition: 0.3s; margin-bottom: 8px; }
        .nav-link.active { background: linear-gradient(90deg, rgba(0, 194, 255, 0.15), transparent); color: var(--primary); font-weight: 600; border-left: 3px solid var(--primary); }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 40px; max-width: 1200px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }

        /* --- VUE CARTES RÉALISTES --- */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; display: none; }
        
        .ticket-visual {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px; padding: 20px; position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden; transition: 0.3s;
        }
        .ticket-visual:hover { transform: translateY(-5px); border-color: var(--primary); }
        .ticket-visual::after { 
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(30deg); pointer-events: none;
        }

        .ticket-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .ticket-logo { font-weight: 900; font-size: 14px; color: var(--primary); }
        .ticket-price { background: var(--primary); color: #020617; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 12px; }
        
        .ticket-body { text-align: center; padding: 10px 0; border-top: 1px dashed rgba(255,255,255,0.1); border-bottom: 1px dashed rgba(255,255,255,0.1); margin: 15px 0; }
        .ticket-code { font-family: 'monospace'; font-size: 24px; font-weight: 900; letter-spacing: 2px; color: white; display: block; margin: 5px 0; }
        .ticket-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

        /* --- SWITCHER --- */
        .view-switcher { display: flex; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; margin-bottom: 20px; width: fit-content; }
        .switch-btn { padding: 8px 20px; border-radius: 8px; border: none; background: transparent; color: #64748b; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; }
        .switch-btn.active { background: var(--primary); color: #020617; }

        /* ... Ton CSS existant pour le tableau et les stats ... */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-item { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 800; }
        .stat-value { font-size: 28px; font-weight: 900; display: block; }
        .registry-card { background: var(--card-bg); border-radius: 25px; border: 1px solid var(--border); padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 10px; color: #475569; border-bottom: 1px solid var(--border); }
        td { padding: 15px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .code-badge { font-family: monospace; color: var(--primary); background: rgba(0, 194, 255, 0.1); padding: 4px 8px; border-radius: 5px; }
        .btn-group { display: flex; gap: 8px; }
        .btn-action { padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 10px; font-weight: 800; border: 1px solid transparent; }
        .btn-danger { color: var(--danger); background: rgba(255,71,87,0.1); border-color: var(--danger); }
        .search-input { width: 100%; max-width: 300px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 10px 15px; border-radius: 10px; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-title" id="sideLogo">AERIO</div>
        <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
        <a href="ajouter-tarif.html" class="nav-link">💎 Ajouter un Tarif</a>
        <a href="liste-tarif.html" class="nav-link">📜 Ma Grille Tarifaire</a>
        <a href="ajouter-ticket.html" class="nav-link">🎫 Générer un Pass</a>
        <a href="liste-tickets.html" class="nav-link active">🔑 Registre des Accès</a>
    </div>

    <div class="main-content">
        <div class="header-flex">
            <div>
                <h1 style="font-size: 28px; font-weight: 900;">UNITÉ DE <span style="color:var(--primary)">STOCKAGE</span></h1>
            </div>
            <div class="btn-group">
                <button class="btn-action btn-danger" onclick="clearStock()">Vider le Stock ☢️</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Total Injecté</span>
                <span id="totalCodes" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Disponibles</span>
                <span id="stockDispo" class="stat-value" style="color:var(--accent)">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Ventes</span>
                <span id="soldCodes" class="stat-value" style="color:var(--warning)">0</span>
            </div>
        </div>

        <div class="view-switcher">
            <button class="switch-btn active" onclick="toggleView('table', this)">Vue Liste</button>
            <button class="switch-btn" onclick="toggleView('cards', this)">Vue Cartes (Réaliste)</button>
        </div>

        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Rechercher un code..." onkeyup="filtrer()">

        <div id="tableView" class="registry-card">
            <table>
                <thead>
                    <tr><th>CODE</th><th>OFFRE</th><th>PRIX</th><th>DATE</th></tr>
                </thead>
                <tbody id="stockTableBody"></tbody>
            </table>
        </div>

        <div id="cardsView" class="grid-cards">
            </div>

        <div id="emptyMsg" style="text-align:center; padding:50px; display:none;">
            <h3>🕳️ Stock vide</h3>
        </div>
    </div>

    <script>
        function toggleView(view, btn) {
            document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(view === 'table') {
                document.getElementById('tableView').style.display = 'block';
                document.getElementById('cardsView').style.display = 'none';
            } else {
                document.getElementById('tableView').style.display = 'none';
                document.getElementById('cardsView').style.display = 'grid';
            }
        }

        function chargerInventaire() {
            const config = JSON.parse(localStorage.getItem('aerio_config')) || {};
            const devise = config.currency || 'XAF';
            document.getElementById('sideLogo').innerText = config.name || "AERIO";

            const stock = JSON.parse(localStorage.getItem('aerio_stock')) || [];
            const tarifs = JSON.parse(localStorage.getItem('aerio_tarifs')) || [];
            
            document.getElementById('totalCodes').innerText = stock.length;
            const dispo = stock.filter(s => !s.vendu).length;
            document.getElementById('stockDispo').innerText = dispo;
            document.getElementById('soldCodes').innerText = stock.length - dispo;

            const tbody = document.getElementById('stockTableBody');
            const cardsContainer = document.getElementById('cardsView');
            
            if(stock.length === 0) {
                document.getElementById('emptyMsg').style.display = 'block';
                return;
            }

            tbody.innerHTML = "";
            cardsContainer.innerHTML = "";

            [...stock].reverse().forEach(item => {
                const tarif = tarifs.find(t => t.id == item.tarifId) || { nom: "Standard", prix: "0" };
                
                // 1. Remplissage Tableau
                tbody.innerHTML += `<tr>
                    <td><span class="code-badge">${item.code}</span></td>
                    <td>${tarif.nom}</td>
                    <td style="color:var(--primary)">${tarif.prix} ${devise}</td>
                    <td>${item.dateAjout}</td>
                </tr>`;

                // 2. Remplissage Cartes Réalistes
                cardsContainer.innerHTML += `
                    <div class="ticket-visual">
                        <div class="ticket-header">
                            <span class="ticket-logo">${config.name || 'AERIO'}</span>
                            <span class="ticket-price">${tarif.prix} ${devise}</span>
                        </div>
                        <div class="ticket-label">Pass Accès Internet</div>
                        <div class="ticket-body">
                            <span class="ticket-label">Votre Code</span>
                            <span class="ticket-code">${item.code}</span>
                        </div>
                        <div style="font-size:9px; color:#475569; text-align:center;">
                            Validité : ${tarif.nom} <br> Connectez-vous au réseau pour activer.
                        </div>
                    </div>
                `;
            });
        }

        function clearStock() {
            if(confirm("Purger tout le stock ?")) {
                localStorage.removeItem('aerio_stock');
                location.reload();
            }
        }

        window.onload = chargerInventaire;
    </script>
</body>
</html>
