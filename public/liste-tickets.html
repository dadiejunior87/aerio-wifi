<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Registre & Ventes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00C2FF; --accent: #00F5A0; --warning: #FFAB00; --danger: #ff4757;
            --bg-deep: #020617; --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08); --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: var(--bg-deep); color: white; display: flex; min-height: 100vh;
            background-image: radial-gradient(circle at bottom left, rgba(0, 194, 255, 0.03), transparent 40%);
        }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-w); background: #0b0f1a; padding: 30px 20px; height: 100vh; position: fixed; border-right: 1px solid var(--border); z-index: 100; }
        .logo-title { color: var(--primary); font-weight: 900; font-size: 24px; margin-bottom: 40px; letter-spacing: -1px; }
        .nav-link { padding: 14px 18px; color: #64748b; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 13px; border-radius: 12px; transition: 0.3s; margin-bottom: 8px; }
        .nav-link.active { background: linear-gradient(90deg, rgba(0, 194, 255, 0.15), transparent); color: var(--primary); font-weight: 600; border-left: 3px solid var(--primary); }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 40px; max-width: 1200px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* --- STATS --- */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-item { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 800; }
        .stat-value { font-size: 28px; font-weight: 900; display: block; }

        /* --- VUE CARTES RÉALISTES --- */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; display: none; }
        
        .ticket-visual {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px; padding: 20px; position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden; transition: 0.3s;
        }
        .ticket-visual:hover { transform: translateY(-5px); border-color: var(--primary); }
        .ticket-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .ticket-logo { font-weight: 900; font-size: 14px; color: var(--primary); }
        .ticket-price { background: var(--primary); color: #020617; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 12px; }
        .ticket-body { text-align: center; padding: 15px 0; border-top: 1px dashed rgba(255,255,255,0.1); border-bottom: 1px dashed rgba(255,255,255,0.1); margin: 10px 0; }
        .ticket-code { font-family: monospace; font-size: 26px; font-weight: 900; color: white; display: block; }
        .ticket-label { font-size: 9px; color: #64748b; text-transform: uppercase; }

        /* BOUTONS ACTIONS */
        .btn-vendre { 
            width: 100%; background: var(--accent); color: #020617; border: none; 
            padding: 10px; border-radius: 12px; font-weight: 900; cursor: pointer; 
            margin-top: 10px; text-transform: uppercase; font-size: 11px;
        }
        .btn-vendre:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* --- SWITCHER & SEARCH --- */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .view-switcher { display: flex; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .switch-btn { padding: 8px 15px; border-radius: 8px; border: none; background: transparent; color: #64748b; cursor: pointer; font-size: 11px; font-weight: 600; }
        .switch-btn.active { background: var(--primary); color: #020617; }
        .search-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 10px 15px; border-radius: 12px; color: white; width: 250px; }

        /* TABLEAU */
        .registry-card { background: var(--card-bg); border-radius: 25px; border: 1px solid var(--border); padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 10px; color: #475569; border-bottom: 1px solid var(--border); }
        td { padding: 15px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .code-badge { font-family: monospace; color: var(--primary); background: rgba(0, 194, 255, 0.1); padding: 4px 8px; border-radius: 6px; }

        /* ZONE D'IMPRESSION CACHÉE */
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 100%; display: flex; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-title" id="sideLogo">AERIO</div>
        <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
        <a href="ajouter-tarif.html" class="nav-link">💎 Ajouter un Tarif</a>
        <a href="liste-tarif.html" class="nav-link">📜 Ma Grille Tarifaire</a>
        <a href="ajouter-ticket.html" class="nav-link">🎫 Générer un Pass</a>
        <a href="liste-tickets.html" class="nav-link active">🔑 Registre des Accès</a>
    </div>

    <div class="main-content">
        <div class="header-flex">
            <h1 style="font-size: 28px; font-weight: 900;">UNITÉ DE <span style="color:var(--primary)">FLUX</span></h1>
            <button onclick="localStorage.removeItem('aerio_stock'); location.reload();" style="background:none; border:none; color:var(--danger); font-size:11px; cursor:pointer;">PURGER TOUT ☢️</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Stock Total</span>
                <span id="totalCodes" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Disponibles</span>
                <span id="stockDispo" class="stat-value" style="color:var(--accent)">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Ventes (CA)</span>
                <span id="caTotal" class="stat-value" style="color:var(--warning)">0</span>
            </div>
        </div>

        <div class="controls">
            <div class="view-switcher">
                <button class="switch-btn active" onclick="toggleView('table', this)">Vue Liste</button>
                <button class="switch-btn" onclick="toggleView('cards', this)">Vue Cartes</button>
            </div>
            <input type="text" class="search-input" placeholder="Rechercher un code..." onkeyup="filtrer(this.value)">
        </div>

        <div id="tableView" class="registry-card">
            <table>
                <thead>
                    <tr><th>CODE</th><th>OFFRE</th><th>PRIX</th><th>STATUT</th></tr>
                </thead>
                <tbody id="stockTableBody"></tbody>
            </table>
        </div>

        <div id="cardsView" class="grid-cards"></div>
    </div>

    <script>
        function toggleView(view, btn) {
            document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tableView').style.display = (view === 'table') ? 'block' : 'none';
            document.getElementById('cardsView').style.display = (view === 'cards') ? 'grid' : 'none';
        }

        function chargerInventaire() {
            const config = JSON.parse(localStorage.getItem('aerio_config')) || {};
            const devise = config.currency || 'XAF';
            document.getElementById('sideLogo').innerText = config.name || "AERIO";

            const stock = JSON.parse(localStorage.getItem('aerio_stock')) || [];
            const tarifs = JSON.parse(localStorage.getItem('aerio_tarifs')) || [];
            
            const tbody = document.getElementById('stockTableBody');
            const cardsContainer = document.getElementById('cardsView');
            let ca = 0;

            tbody.innerHTML = "";
            cardsContainer.innerHTML = "";

            [...stock].reverse().forEach((item, index) => {
                const tarif = tarifs.find(t => t.id == item.tarifId) || { nom: "Standard", prix: 0 };
                if(item.vendu) ca += parseFloat(tarif.prix);

                // Ligne Tableau
                tbody.innerHTML += `
                    <tr>
                        <td><span class="code-badge">${item.code}</span></td>
                        <td>${tarif.nom}</td>
                        <td style="color:var(--primary)">${tarif.prix} ${devise}</td>
                        <td>${item.vendu ? '✅ Vendu' : '📥 En Stock'}</td>
                    </tr>
                `;

                // Carte (Seulement si non vendu pour ne pas encombrer la vue vente)
                if(!item.vendu) {
                    cardsContainer.innerHTML += `
                        <div class="ticket-visual">
                            <div class="ticket-header">
                                <span class="ticket-logo">${config.name || 'AERIO'}</span>
                                <span class="ticket-price">${tarif.prix} ${devise}</span>
                            </div>
                            <div class="ticket-body">
                                <span class="ticket-label">CODE D'ACCÈS</span>
                                <span class="ticket-code">${item.code}</span>
                            </div>
                            <div class="ticket-label" style="text-align:center; margin-bottom:10px;">VALIDITÉ : ${tarif.nom}</div>
                            <button class="btn-vendre" onclick="vendreTicket('${item.code}')">Vendre & Imprimer ⚡</button>
                        </div>
                    `;
                }
            });

            document.getElementById('totalCodes').innerText = stock.length;
            document.getElementById('stockDispo').innerText = stock.filter(s => !s.vendu).length;
            document.getElementById('caTotal').innerText = ca + " " + devise;
        }

        function vendreTicket(code) {
            let stock = JSON.parse(localStorage.getItem('aerio_stock')) || [];
            const index = stock.findIndex(s => s.code === code);
            
            if(index !== -1) {
                stock[index].vendu = true;
                localStorage.setItem('aerio_stock', JSON.stringify(stock));
                
                // Déclencher l'impression
                const config = JSON.parse(localStorage.getItem('aerio_config')) || {};
                const tarifs = JSON.parse(localStorage.getItem('aerio_tarifs')) || [];
                const tarif = tarifs.find(t => t.id == stock[index].tarifId) || { nom: "Standard", prix: 0 };
                
                imprimerTicket(code, tarif.prix, tarif.nom, config.currency || 'XAF');
                
                // Recharger la vue
                chargerInventaire();
            }
        }

        function imprimerTicket(code, prix, nom, devise) {
            const config = JSON.parse(localStorage.getItem('aerio_config')) || {};
            const printDiv = document.createElement('div');
            printDiv.className = 'print-area';
            printDiv.innerHTML = `
                <div style="width:250px; padding:20px; border:1px solid #000; font-family:sans-serif; text-align:center; color:black; background:white;">
                    <h2 style="margin:0;">${config.name || 'AERIO'}</h2>
                    <p style="font-size:12px;">WIFI HOTSPOT PASS</p>
                    <hr>
                    <p style="font-size:10px;">OFFRE: ${nom}</p>
                    <h1 style="margin:10px 0; font-size:32px;">${code}</h1>
                    <p style="font-size:14px; font-weight:bold;">PRIX: ${prix} ${devise}</p>
                    <hr>
                    <p style="font-size:9px;">Connectez-vous et entrez le code.</p>
                </div>
            `;
            document.body.appendChild(printDiv);
            window.print();
            document.body.removeChild(printDiv);
        }

        window.onload = chargerInventaire;
    </script>
</body>
</html>
