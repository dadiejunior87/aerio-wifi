<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Inscription Partenaire Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00F5A0; --accent: #00C2FF; --bg: #020617;
            --card: rgba(15, 23, 42, 0.8); --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg); color: white; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* Effet de fond "Glow" */
        body::before {
            content: ""; position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 245, 160, 0.05) 0%, transparent 70%);
            top: -10%; left: -10%;
        }

        .auth-container {
            width: 100%; max-width: 450px; z-index: 10; padding: 20px;
            animation: fadeIn 1s ease-out;
        }

        .auth-card {
            background: var(--card); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 35px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area h1 { font-size: 35px; font-weight: 900; letter-spacing: -2px; color: var(--accent); }
        .logo-area p { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 10px; font-weight: 800; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        
        input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: white; font-size: 14px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: rgba(0,0,0,0.5); box-shadow: 0 0 15px rgba(0, 245, 160, 0.1); }

        .btn-join {
            width: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #020617; border: none; padding: 18px; border-radius: 12px;
            font-weight: 900; font-size: 14px; cursor: pointer; margin-top: 10px;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-join:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 245, 160, 0.3); }

        .footer-link { text-align: center; margin-top: 25px; font-size: 12px; color: #64748b; }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-area">
                <h1>AERIO <span style="color:white;">Alpha</span></h1>
                <p>Déployez votre empire WiFi</p>
            </div>

            <form id="regForm"> 
                <div class="form-group">
                    <label>Nom complet du Partenaire</label>
                    <input type="text" placeholder="Ex: Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label>Nom de votre Réseau (SSID)</label>
                    <input type="text" placeholder="Ex: AERIO_FREE_WIFI" required>
                </div>

                <div class="form-group">
                    <label>Numéro WhatsApp</label>
                    <input type="tel" placeholder="Ex: 6XXXXXXXX" required>
                </div>

                <div class="form-group">
                    <label>Mot de passe Alpha</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-join" id="submitBtn">
                    <span id="btnText">Activer mon accès Partenaire 🚀</span>
                </button>
            </form>

            <div class="footer-link">
                Déjà partenaire ? <a href="connexion.html">Connectez-vous ici</a>
            </div>
        </div>
        <p style="text-align: center; font-size: 10px; color: #475569; margin-top: 20px;">
            En vous inscrivant, vous acceptez les conditions d'exploitation AERIO Alpha.
        </p>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Empêche l'envoi immédiat pour l'effet de transition
            
            const btn = document.getElementById('submitBtn');
            const text = document.getElementById('btnText');
            
            // Simulation d'initialisation technologique Alpha
            btn.style.opacity = "0.7";
            btn.style.cursor = "wait";
            text.innerText = "INITIALISATION DU SYSTÈME...";
            
            setTimeout(() => {
                text.innerText = "DÉPLOIEMENT DU DASHBOARD...";
                setTimeout(() => {
                    // Redirection finale vers le dashboard
                    window.location.href = "dashboard.html";
                }, 1000);
            }, 1200);
        });
    </script>

</body>
</html>
