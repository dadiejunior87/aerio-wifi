<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Enrôlement Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00C2FF; --bg: #020617; --accent: #00F5A0; --neon: #7000FF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Effet de particules en arrière-plan */
        .bg-dots {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(var(--primary) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.05; z-index: -1;
        }

        .auth-container { position: relative; width: 100%; max-width: 480px; padding: 3px; border-radius: 35px; background: linear-gradient(135deg, var(--primary), var(--neon)); animation: borderRotate 10s linear infinite; }
        @keyframes borderRotate { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .auth-card { 
            background: #020617; padding: 50px 40px; border-radius: 32px; 
            text-align: center; position: relative;
        }

        .header-box { margin-bottom: 40px; }
        .header-box h1 { font-weight: 900; font-size: 28px; letter-spacing: -1px; color: white; }
        .header-box span { color: var(--primary); }
        .badge { background: rgba(0, 194, 255, 0.1); color: var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 9px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }

        .form-group { position: relative; margin-bottom: 25px; text-align: left; }
        .form-group i { position: absolute; left: 15px; top: 43px; color: var(--primary); opacity: 0.7; }
        
        label { font-size: 10px; font-weight: 900; color: #475569; text-transform: uppercase; margin-bottom: 10px; display: block; margin-left: 5px; }
        
        input { 
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); 
            padding: 16px 20px; border-radius: 18px; color: white; font-size: 14px; transition: 0.4s;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(0, 194, 255, 0.05); box-shadow: 0 0 15px rgba(0, 194, 255, 0.1); }

        .row { display: flex; gap: 15px; }

        .submit-btn { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; 
            background: linear-gradient(90deg, var(--primary), var(--neon)); 
            color: white; font-weight: 900; font-size: 15px; cursor: pointer; 
            transition: 0.5s; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(112, 0, 255, 0.4); }

        .footer-text { margin-top: 30px; font-size: 13px; color: #64748b; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 700; }
        
        /* Petit effet de scanner qui passe sur la carte */
        .scanner {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scanMove 3s linear infinite; opacity: 0.5;
        }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="bg-dots"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="scanner"></div>
            
            <div class="header-box">
                <div class="badge">Node Initialization</div>
                <h1>AERIO<span>PARTNER</span></h1>
                <p style="color: #64748b; font-size: 12px; margin-top: 10px;">Rejoignez le premier réseau WiFi décentralisé.</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Identité Business</label>
                    <input type="text" placeholder="Nom du Partenaire ou Structure" required>
                </div>

                <div class="row">
                    <div class="form-group" style="flex: 1;">
                        <label>Ville</label>
                        <input type="text" placeholder="Ex: Maroua" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Contact (Paiement)</label>
                        <input type="tel" placeholder="6xx xxx xxx" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email de Gestion</label>
                    <input type="email" placeholder="admin@aerio.net" required>
                </div>

                <div class="form-group">
                    <label>Clé d'Accès (Pass)</label>
                    <input type="password" placeholder="••••••••••••" required>
                </div>

                <button type="submit" class="submit-btn">Activer mon Nœud Réseau</button>
            </form>

            <div class="footer-text">
                Déjà dans le réseau ? <a href="connexion.html">Accéder au Terminal</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "SYNCHRONISATION...";
            setTimeout(() => {
                alert("SYSTÈME : Données transmises avec succès au protocole ALPHA.");
                btn.innerText = "ACTIVER MON NŒUD RÉSEAU";
            }, 2000);
        });
    </script>
</body>
</html>
