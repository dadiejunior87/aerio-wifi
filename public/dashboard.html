<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Centre de Commande Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C2FF;
            --accent: #00F5A0;
            --purple: #BC00FF;
            --bg-deep: #020617;
            --sidebar-bg: #0b1224;
            --card-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --sidebar-w: 280px;
        }

        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        html, body {
            background: var(--bg-deep);
            color: white;
            /* On autorise le scroll sur le body */
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; 
        }

        body {
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 194, 255, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(188, 0, 255, 0.1) 0%, transparent 35%);
        }

        /* --- SIDEBAR FIXE --- */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sidebar-bg);
            padding: 30px 15px;
            height: 100vh;
            position: fixed; /* Reste collée à gauche */
            top: 0;
            left: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            backdrop-filter: blur(10px);
            overflow-y: auto; /* Scroll interne si trop de menus */
        }

        .logo-title { 
            color: var(--primary); font-weight: 900; font-size: 28px; margin-bottom: 35px; 
            padding-left: 10px; letter-spacing: -1px; display: flex; align-items: center; gap: 10px;
        }
        .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); }
        
        .group-label { font-size: 9px; color: #475569; font-weight: 900; text-transform: uppercase; margin: 25px 0 10px 10px; letter-spacing: 2px; }
        
        .nav-button {
            padding: 12px 15px; border-radius: 14px; display: flex; align-items: center; 
            text-decoration: none; font-size: 13px; margin-bottom: 4px; border: 1px solid transparent;
            color: #94a3b8; transition: all 0.3s ease;
        }
        .nav-button i { margin-right: 12px; font-style: normal; font-size: 18px; filter: grayscale(1); }
        .nav-button:hover { background: rgba(255, 255, 255, 0.05); color: white; transform: translateX(5px); }
        .nav-button.active { 
            background: linear-gradient(90deg, rgba(0, 194, 255, 0.15) 0%, transparent 100%); 
            color: var(--primary); border-left: 4px solid var(--primary); font-weight: 600;
        }

        /* --- ZONE DE CONTENU --- */
        main {
            margin-left: var(--sidebar-w); /* Décale le contenu pour laisser la place à la sidebar */
            width: calc(100% - var(--sidebar-w));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex; justify-content: flex-end; align-items: center; gap: 20px;
            padding: 20px 40px; position: sticky; top: 0; z-index: 900;
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }

        .content { 
            padding: 30px 40px; 
            flex: 1; /* Prend toute la place restante */
        }
        
        /* --- GRIDS & CARDS --- */
        .top-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 35px; }
        .action-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px;
            padding: 20px; display: flex; align-items: center; gap: 18px;
            text-decoration: none; transition: 0.4s; backdrop-filter: blur(10px);
        }
        .action-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .icon-box { 
            width: 50px; height: 50px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px;
            background: #1e293b; border: 1px solid var(--border);
        }

        .smart-banner {
            background: linear-gradient(135deg, #1e1b4b 0%, #2e1065 100%);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 28px; padding: 30px; margin-bottom: 35px;
            display: flex; align-items: center; gap: 20px;
        }

        .main-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 35px; }
        .card-main { 
            background: var(--card-bg); padding: 40px; border-radius: 35px; border: 1px solid var(--border); 
            text-align: center; position: relative; overflow: hidden;
        }
        .val-large { font-size: 54px; font-weight: 900; margin: 10px 0; letter-spacing: -2px; }

        .mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding-bottom: 50px; }
        .mini-card { 
            padding: 25px; border-radius: 28px; border: 1px solid var(--border); 
            background: rgba(255,255,255,0.03); border-bottom: 4px solid #334155;
        }

        .lang-btn { background: none; border: none; color: #475569; font-size: 10px; font-weight: 900; cursor: pointer; padding: 6px 12px; border-radius: 8px; }
        .lang-btn.active { background: var(--primary); color: #020617; }

        /* --- RESPONSIVE --- */
        @media (max-width: 1100px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar .logo-title, .sidebar .group-label, .sidebar span { display: none; }
            main { margin-left: 80px; width: calc(100% - 80px); }
