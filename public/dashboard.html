<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Centre de Commande Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C2FF;
            --accent: #00F5A0;
            --purple: #BC00FF;
            --bg-deep: #020617;
            --sidebar-bg: #0b1224;
            --card-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --sidebar-w: 280px;
        }

        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        html, body {
            background: var(--bg-deep);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; 
        }

        body {
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 194, 255, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(188, 0, 255, 0.1) 0%, transparent 35%);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sidebar-bg);
            padding: 30px 15px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo-title { 
            color: var(--primary); font-weight: 900; font-size: 28px; margin-bottom: 35px; 
            display: flex; align-items: center; gap: 10px;
        }
        .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); }

        .group-label { font-size: 9px; color: #475569; font-weight: 900; text-transform: uppercase; margin: 25px 0 10px 10px; letter-spacing: 2px; }

        .nav-button {
            padding: 12px 15px; border-radius: 14px; display: flex; align-items: center; 
            text-decoration: none; font-size: 13px; margin-bottom: 4px;
            color: #94a3b8; transition: 0.3s;
        }
        .nav-button:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-button.active { 
            background: linear-gradient(90deg, rgba(0, 194, 255, 0.15) 0%, transparent 100%); 
            color: var(--primary); border-left: 4px solid var(--primary);
        }

        /* --- MAIN CONTENT --- */
        main {
            margin-left: var(--sidebar-w);
            width: calc(100% - var(--sidebar-w));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex; justify-content: flex-end; padding: 20px 40px;
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 900;
        }

        .content { padding: 30px 40px; }

        /* --- DASHBOARD ELEMENTS --- */
        .top-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 35px; }
        .action-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; display: flex; align-items: center; gap: 15px; text-decoration: none; color: white;
        }

        .main-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 35px; }
        .card-main { 
            background: var(--card-bg); padding: 40px; border-radius: 30px; border: 1px solid var(--border); text-align: center;
        }
        .val-large { font-size: 48px; font-weight: 900; margin: 10px 0; }

        .mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding-bottom: 50px;}
        .mini-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar span, .sidebar .group-label { display: none; }
            main { margin-left: 80px; width: calc(100% - 80px); }
            .top-nav, .main-stats, .mini-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-title"><div class="logo-dot"></div> AERIO</div>
        <div class="group-label">Pilotage</div>
        <a href="#" class="nav-button active">🏠 <span>Tableau de bord</span></a>
        <a href="#" class="nav-button">📡 <span>Zones WiFi</span></a>
        <a href="#" class="nav-button">💰 <span>Finances</span></a>
    </aside>

    <main>
        <div class="top-bar">
            <div style="background: #0b1224; padding: 8px 15px; border-radius: 10px; border: 1px solid var(--border);">FR</div>
        </div>

        <div class="content">
            <div class="top-nav">
                <div class="action-card">👤 <b>MON COMPTE</b></div>
                <div class="action-card">💬 <b>SUPPORT</b></div>
                <div class="action-card">📚 <b>DOCS</b></div>
            </div>

            <div class="main-stats">
                <div class="card-main">
                    <p>SOLDE DISPONIBLE</p>
                    <div class="val-large">0 <small style="font-size: 20px;">XAF</small></div>
                </div>
                <div class="card-main">
                    <p>RECETTES TOTALES</p>
                    <div class="val-large">0 <small style="font-size: 20px;">XAF</small></div>
                </div>
            </div>

            <div class="mini-grid">
                <div class="mini-card"><p>PASS VENDUS</p><h3>0</h3></div>
                <div class="mini-card"><p>RETRAITS</p><h3>0</h3></div>
                <div class="mini-card"><p>JOUR</p><h3>0</h3></div>
                <div class="mini-card"><p>LIVE</p><h3>0</h3></div>
            </div>
        </div>
    </main>

</body>
</html>
