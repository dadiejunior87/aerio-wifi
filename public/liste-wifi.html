<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Matrice des Nœuds</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #00C2FF; --bg: #020617; --glass: rgba(15, 23, 42, 0.7); --accent: #00F5A0; --danger: #FF4B4B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; padding: 60px 5%; background-image: radial-gradient(circle at top right, rgba(0, 194, 255, 0.05), transparent); }

        .header-matrix { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .btn-new { background: var(--primary); color: #020617; padding: 15px 25px; border-radius: 15px; text-decoration: none; font-weight: 900; font-size: 11px; text-transform: uppercase; }

        /* ✅ TABLEAU ALPHA [1.5] */
        .matrix-container { background: var(--glass); backdrop-filter: blur(40px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 25px; font-size: 10px; color: #475569; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 25px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .status-dot { display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px var(--accent); }
        .btn-tactical { background: rgba(255,255,255,0.05); color: white; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 10px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="header-matrix">
        <div>
            <h1 style="font-weight: 900; font-size: 32px; letter-spacing: -1px;">MATRICE DES <span style="color:var(--primary)">NŒUDS</span></h1>
            <p style="color: #475569; font-size: 12px;">Supervision centralisée de vos actifs réseau.</p>
        </div>
        <a href="ajouter-wifi.html" class="btn-new">+ DÉPLOYER UN NOUVEAU NŒUD</a>
    </div>

    <div class="matrix-container">
        <table>
            <thead>
                <tr>
                    <th>IDENTIFIANT NŒUD</th>
                    <th>ARGUMENTAIRE / DESCRIPTION</th>
                    <th>CONTACT SUPPORT</th>
                    <th>COMMANDES TACTIQUES</th>
                </tr>
            </thead>
            <tbody id="matrix-body">
                <!-- ✅ LIAISON RÉTABLIE : UN PREMIER NŒUD RÉEL -->
                <tr>
                    <td style="font-weight: 900; color: var(--primary);">#ANT-MAROUA-01</td>
                    <td>Antenne Alpha Centre-Ville (MikroTik RB951)</td>
                    <td>+237 692 487 922</td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <span class="status-dot"></span> <span style="color:var(--accent); font-weight:900; font-size:10px;">ACTIF</span>
                            <a href="#" class="btn-tactical" onclick="alert('Lancement du diagnostic satellite...')">DIAGNOSTIC</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div style="text-align: center; margin-top: 50px;">
        <a href="dashboard.html" style="color:#475569; text-decoration:none; font-size:11px; font-weight:800; letter-spacing:3px;">— RETOUR AU COCKPIT DE PILOTAGE —</a>
    </div>

</body>
</html>
