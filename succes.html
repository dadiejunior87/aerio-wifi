<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Connexion Établie</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00C2FF; --bg: #020617; --accent: #00F5A0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; overflow: hidden; }

        .success-glow { position: absolute; width: 300px; height: 300px; background: var(--accent); border-radius: 50%; filter: blur(150px); opacity: 0.1; animation: pulse 3s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(1); } }

        .container { position: relative; z-index: 10; padding: 30px; width: 100%; max-width: 450px; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .icon { font-size: 80px; margin-bottom: 20px; text-shadow: 0 0 30px var(--accent); }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1.5px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 40px; font-weight: 500; }

        .ticket-box { background: rgba(255,255,255,0.03); border: 2px dashed var(--accent); padding: 35px; border-radius: 35px; margin-bottom: 30px; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); }
        .code { font-size: 42px; font-weight: 900; color: var(--accent); letter-spacing: 5px; text-shadow: 0 0 20px var(--accent); }
        
        /* BOUTON WHATSAPP DADIE IA */
        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 18px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-bottom: 20px;
            border: none;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        }
        .btn-whatsapp:hover { transform: scale(1.02); background: #1eb954; }

        .loading-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 30px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: var(--accent); transition: 8s linear; box-shadow: 0 0 15px var(--accent); }

        .btn-direct { display: block; margin-top: 20px; color: var(--primary); text-decoration: none; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-direct:hover { color: white; transform: scale(1.05); }

        @media (max-width: 480px) { h1 { font-size: 24px; } .code { font-size: 32px; } }
    </style>
</head>
<body>
    <div class="success-glow"></div>
    <div class="container">
        <div class="icon">✅</div>
        <h1>PAIEMENT <span style="color:var(--accent)">VALIDE</span></h1>
        <p>Protocole de connexion Alpha activé avec succès.</p>

        <div class="ticket-box">
            <div style="font-size: 10px; font-weight: 800; color: #475569; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase;">Votre ticket de connexion</div>
            
            <div class="code" id="wifi-code">ATTENTE...</div>

            <a href="#" id="whatsapp-btn" target="_blank" class="btn-whatsapp">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l4.14-1.086c1.17.637 2.483.974 3.827.975h.003c4.368 0 7.926-3.558 7.93-7.93a7.897 7.897 0 0 0-2.359-5.633zM7.994 14.52a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                </svg>
                Sauvegarder sur WhatsApp
            </a>
            
            <div class="loading-bar"><div class="progress" id="bar"></div></div>
            <p id="status-msg" style="margin-top: 15px; font-size: 10px; color: var(--accent); font-weight: 700;">ACCÈS INTERNET DANS <span id="timer">8</span>s...</p>
        </div>
        
        <a href="https://www.google.com" class="btn-direct">Accéder à internet maintenant →</a>
    </div>

    <script>
        // ✅ GESTION DYNAMIQUE DADIE IA
        function startFinalSequence(code) {
            const wifiCodeDisplay = document.getElementById('wifi-code');
            const whatsappBtn = document.getElementById('whatsapp-btn');
            const bar = document.getElementById('bar');
            const timerElement = document.getElementById('timer');
            let timeLeft = 8;

            const finalCode = code.toUpperCase();
            wifiCodeDisplay.innerText = finalCode;

            // CONFIGURATION WHATSAPP
            const message = encodeURIComponent(`🛰️ AERIO WiFi\n\nVotre ticket d'accès est : *${finalCode}*\n\nBon surf sur le réseau Alpha !`);
            whatsappBtn.href = `https://wa.me/?text=${message}`;

            setTimeout(() => { bar.style.width = "100%"; }, 100);

            const countdown = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    window.location.href = "https://www.google.com";
                }
            }, 1000);
        }

        async function fetchMyCode() {
            const urlParams = new URLSearchParams(window.location.search);
            const directCode = urlParams.get('user'); 
            
            if (directCode && directCode !== "Vérification...") {
                startFinalSequence(directCode);
                return;
            }

            try {
                // Attente synchronisation Webhook
                await new Promise(r => setTimeout(r, 2000)); 
                
                const response = await fetch('database/tickets_vendus.json');
                const ventes = await response.json();
                
                if (ventes.length > 0) {
                    const lastTicket = ventes[ventes.length - 1];
                    startFinalSequence(lastTicket.code);
                } else {
                    startFinalSequence("ALPHA-XT");
                }
            } catch (e) {
                console.error("Erreur base de données", e);
                startFinalSequence("RESEAU-OK");
            }
        }

        window.onload = fetchMyCode;
    </script>
</body>
</html>
