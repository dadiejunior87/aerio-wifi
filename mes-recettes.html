<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIO | Journal des Recettes Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00C2FF; --bg: #020617; --glass: rgba(15, 23, 42, 0.7); --accent: #00F5A0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; padding: 40px; background-image: radial-gradient(circle at top left, rgba(0, 194, 255, 0.05), transparent); }

        .top-nav-recettes { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .lang-switcher { display: flex; gap: 5px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .lang-btn { background: none; border: none; color: #475569; font-size: 9px; font-weight: 900; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: #020617; box-shadow: 0 0 10px var(--primary); }

        .header-recettes h1 { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; }

        .stats-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-mini { background: var(--glass); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        
        .table-card { background: var(--glass); backdrop-filter: blur(30px); padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 600px; }
        th { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 2px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 13px; font-weight: 600; }

        .gain-text { color: var(--accent); font-weight: 900; }
        .back-link { display: block; text-align: center; margin-top: 40px; color: #475569; text-decoration: none; font-size: 11px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="top-nav-recettes">
        <div class="header-recettes">
            <h1 id="page-title">Journal des <span style="color:var(--primary)">Recettes</span></h1>
        </div>
        <div class="lang-switcher">
            <button onclick="changeLang('fr')" id="btn-fr" class="lang-btn active">FR</button>
            <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
            <button onclick="changeLang('pt')" id="btn-pt" class="lang-btn">PT</button>
            <button onclick="changeLang('es')" id="btn-es" class="lang-btn">ES</button>
        </div>
    </div>

    <div class="stats-banner">
        <div class="stat-mini">
            <p id="label-sold" style="font-size: 10px; color: #475569; font-weight: 900;">UNITÉS VENDUES</p>
            <div id="total-count" style="font-size: 32px; font-weight: 900; color: var(--primary);">0</div>
        </div>
        <div class="stat-mini">
            <p id="label-revenue" style="font-size: 10px; color: #475569; font-weight: 900;">CHIFFRE D'AFFAIRES GÉNÉRÉ</p>
            <div id="total-gain" style="font-size: 32px; font-weight: 900; color: var(--accent);">0 F</div>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th id="th-date">DATE / HEURE</th>
                    <th id="th-code">CODE WIFI</th>
                    <th id="th-value">VALEUR DU TICKET</th>
                </tr>
            </thead>
            <tbody id="recettes-list"></tbody>
        </table>
    </div>

    <a href="dashboard.html" class="back-link">← <span id="back-text">Retour au QG Alpha</span></a>

    <script>
        const translations = {
            fr: { title: "Journal des Recettes", sold: "UNITÉS VENDUES", rev: "CHIFFRE D'AFFAIRES GÉNÉRÉ", thD: "DATE / HEURE", thC: "CODE WIFI", thV: "VALEUR", back: "Retour au QG Alpha" },
            en: { title: "Revenue Log", sold: "UNITS SOLD", rev: "TOTAL REVENUE", thD: "DATE / TIME", thC: "WIFI CODE", thV: "VALUE", back: "Back to HQ Alpha" },
            pt: { title: "Registo de Receitas", sold: "UNIDADES VENDIDAS", rev: "RECEITA TOTAL", thD: "DATA / HORA", thC: "CÓDIGO WIFI", thV: "VALOR", back: "Voltar ao QG Alpha" },
            es: { title: "Registro de Ingresos", sold: "UNIDADES VENDIDAS", rev: "INGRESOS TOTALES", thD: "FECHA / HORA", thC: "CÓDIGO WIFI", thV: "VALOR", back: "Volver al QG Alpha" }
        };

        function changeLang(lang) {
            const t = translations[lang] || translations.fr;
            document.getElementById('page-title').innerHTML = t.title.replace('Recettes', `<span style="color:var(--primary)">Recettes</span>`)
                                                                   .replace('Log', `<span style="color:var(--primary)">Log</span>`)
                                                                   .replace('Receitas', `<span style="color:var(--primary)">Receitas</span>`)
                                                                   .replace('Ingresos', `<span style="color:var(--primary)">Ingresos</span>`);
            document.getElementById('label-sold').innerText = t.sold;
            document.getElementById('label-revenue').innerText = t.rev;
            document.getElementById('th-date').innerText = t.thD;
            document.getElementById('th-code').innerText = t.thC;
            document.getElementById('th-value').innerText = t.thV;
            document.getElementById('back-text').innerText = t.back;
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${lang}`);
            if(activeBtn) activeBtn.classList.add('active');
            localStorage.setItem('aerio_lang', lang);
        }

        function loadRecettes() {
            const stock = JSON.parse(localStorage.getItem('aerio_stock')) || [];
            const tarifs = JSON.parse(localStorage.getItem('aerio_tarifs')) || [];
            const config = JSON.parse(localStorage.getItem('aerio_config')) || {};
            const devise = config.currency || 'XAF';

            const soldTickets = stock.filter(t => t.vendu);
            document.getElementById('total-count').innerText = soldTickets.length;
            
            let totalGain = 0;
            const container = document.getElementById('recettes-list');
            container.innerHTML = "";

            if (soldTickets.length === 0) {
                container.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:50px; color:#475569; opacity:0.5;">Aucune vente enregistrée.</td></tr>`;
                return;
            }

            [...soldTickets].reverse().forEach(t => {
                const tarif = tarifs.find(opt => opt.id == t.tarifId) || { prix: 0 };
                totalGain += parseFloat(tarif.prix || 0);

                container.innerHTML += `
                    <tr>
                        <td style="color:#94a3b8">${t.dateVente || '---'}</td>
                        <td><span style="font-family:monospace; color:var(--primary); background:rgba(0,194,255,0.05); padding:4px 8px; border-radius:5px;">${t.code}</span></td>
                        <td class="gain-text">${tarif.prix || 0} ${devise}</td>
                    </tr>
                `;
            });

            document.getElementById('total-gain').innerText = `${totalGain} ${devise}`;
        }

        window.onload = () => {
            loadRecettes();
            const savedLang = localStorage.getItem('aerio_lang') || 'fr';
            changeLang(savedLang);
        };
    </script>
</body>
</html>
